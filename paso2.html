<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1080">
<title>Paso 2 · Material</title>
<style>
:root{
  --bg:#f4f2f8;--card:#fff;--border:#e0ddf0;--primary:#1a1080;--primary-soft:#efeafb;
  --primary-2:#3a2ec0;--ink:#1b1830;--muted:#6a6688;--radius:14px;
  --shadow:0 1px 3px rgba(26,16,128,.06),0 6px 18px rgba(26,16,128,.05);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.4;padding-bottom:92px}
button{font-family:inherit;cursor:pointer;touch-action:manipulation}
input{font-family:inherit}

.hdr{position:sticky;top:0;z-index:40;background:var(--primary);color:#fff;
  padding:calc(env(safe-area-inset-top) + 12px) 16px 0;box-shadow:0 2px 12px rgba(26,16,128,.25)}
.hdr-row{display:flex;align-items:center;gap:12px;max-width:760px;margin:0 auto}
.back{background:rgba(255,255,255,.14);border:none;color:#fff;width:36px;height:36px;
  border-radius:10px;font-size:18px;flex:0 0 auto;display:grid;place-items:center}
.htxt h1{font-size:15px;margin:0;font-weight:700}
.htxt .folio{font-size:11.5px;opacity:.82;margin-top:1px;letter-spacing:.3px}
.prog{max-width:760px;margin:0 auto;display:flex;gap:6px;padding:12px 0 0}
.pstep{flex:1;text-align:center;padding-bottom:11px}
.pbar{height:4px;border-radius:4px;background:rgba(255,255,255,.25)}
.pstep.on .pbar{background:#fff}.pstep.done .pbar{background:#8fd6a8}
.plabel{font-size:10px;color:rgba(255,255,255,.75);margin-top:5px;font-weight:600}
.pstep.on .plabel{color:#fff}

.wrap{max-width:760px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.card h2{font-size:14px;margin:0 0 6px;color:var(--primary);font-weight:800;
  display:flex;align-items:center;gap:8px}
.card h2 .dot{width:8px;height:8px;border-radius:50%;background:var(--primary-2)}
.hint{font-size:11.5px;color:var(--muted);margin:0 0 12px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mat{border:1.5px solid var(--border);border-radius:11px;padding:9px 10px;background:#fbfaff;
  transition:border-color .15s,background .15s}
.mat.filled{border-color:var(--primary-2);background:#fff}
.mat-name{font-size:11.5px;font-weight:700;color:var(--ink);line-height:1.25;min-height:29px;
  display:flex;align-items:center}
.mat-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.mat-row input{flex:1;width:100%;min-width:0;padding:8px;border:1.5px solid var(--border);
  border-radius:8px;font-size:15px;text-align:center;background:#fff;color:var(--ink)}
.mat-row input:focus{outline:none;border-color:var(--primary-2)}
.unit{font-size:10.5px;font-weight:800;color:var(--muted);background:var(--primary-soft);
  padding:5px 7px;border-radius:6px;flex:0 0 auto;min-width:34px;text-align:center;color:var(--primary)}

.epp-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.chk{display:flex;align-items:center;gap:9px;border:1.5px solid var(--border);border-radius:11px;
  padding:12px 12px;background:#fbfaff;font-size:13px;font-weight:700;cursor:pointer;
  transition:border-color .15s,background .15s}
.chk.on{border-color:var(--primary-2);background:var(--primary-soft)}
.chk .box{width:22px;height:22px;border-radius:6px;border:2px solid #c7c0e6;flex:0 0 auto;
  display:grid;place-items:center;font-size:14px;color:#fff;background:#fff;transition:.15s}
.chk.on .box{background:var(--primary);border-color:var(--primary)}

.navbar{position:fixed;left:0;right:0;bottom:0;z-index:30;
  padding:12px 16px calc(env(safe-area-inset-bottom) + 12px);
  background:linear-gradient(to top,var(--bg) 62%,rgba(244,242,248,0))}
.nav-inner{max-width:760px;margin:0 auto;display:flex;gap:10px}
.btn{border:none;border-radius:12px;padding:14px;font-size:14.5px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .06s,background .15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(26,16,128,.28);flex:1.5}
.btn-primary:hover{background:var(--primary-2)}
.btn-ghost{background:#fff;color:var(--primary);border:1.5px solid var(--border);flex:1}
@media(max-width:360px){.grid,.epp-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-row">
    <button class="back" onclick="volver()" aria-label="Atrás">‹</button>
    <div class="htxt"><h1>Material a utilizar</h1><div class="folio" id="folio">—</div></div>
  </div>
  <div class="prog">
    <div class="pstep done"><div class="pbar"></div><div class="plabel">Generales</div></div>
    <div class="pstep on"><div class="pbar"></div><div class="plabel">Material</div></div>
    <div class="pstep"><div class="pbar"></div><div class="plabel">Inmueble</div></div>
    <div class="pstep"><div class="pbar"></div><div class="plabel">Evidencias</div></div>
  </div>
</header>

<main class="wrap">
  <div class="card">
    <h2><span class="dot"></span>Materiales</h2>
    <p class="hint">Captura la cantidad de cada material requerido. Deja en blanco lo que no aplique.</p>
    <div class="grid" id="matGrid"></div>
  </div>

  <div class="card">
    <h2><span class="dot"></span>EPP y certificaciones</h2>
    <p class="hint">Marca lo que el técnico debe portar o presentar.</p>
    <div class="epp-grid" id="eppGrid"></div>
  </div>
</main>

<nav class="navbar">
  <div class="nav-inner">
    <button class="btn btn-ghost" onclick="volver()">‹ Atrás</button>
    <button class="btn btn-primary" onclick="siguiente()">Guardar y continuar ›</button>
  </div>
</nav>

<script>
const MATERIALES = [
  ['tubPD','Tubería pared delgada','mts'],  ['tubPG','Tubería pared gruesa','mts'],
  ['tubFZ','Tubería flexible zapa','mts'],  ['tubL','Tubería licuatite','mts'],
  ['tubAE','Tubería anti explosiva','mts'], ['tubPVC','Tubería PVC / Poliflex','mts'],
  ['canaleta','Canaleta','mts'],            ['mdt10w','MDT 10W','pza'],
  ['pa20','PA20 M/N','pza'],                ['pa200','PA200 R','pza'],
  ['pa400','PA400 R','pza'],                ['ups1500','UPS 1,500 va','pza'],
  ['ups3000','UPS 3,000 va','pza'],         ['trompAl','Trompeta aluminio','pza'],
  ['trompPl','Trompeta plástico','pza'],    ['bocina','Bocina de plafón','pza'],
  ['trompDE','Trompeta dual eliptical','pza'],['trompBT','Trompeta B/T','pza'],
  ['bafle','Bafle','pza'],                  ['amplif','Amplificador','pza'],
  ['cabRudT','Cable rudo trompeta','mts'],  ['cabRudE','Cable rudo estrobo','mts'],
  ['cabPotT','Cable pot trompetas','mts'],  ['cabPotE','Cable pot estrobo','mts'],
  ['cabCoax','Cable coaxial','mts'],        ['gabinete','Gabinete','pza'],
  ['charola','Charola','pza'],              ['estrobo','Estrobo','pza'],
  ['antena','Antena Dip / Ant Gan','pza'],  ['transf12','Transformador 12w','pza'],
  ['transf100','Transformador 100w','pza'], ['relevador','Relevador','pza'],
  ['poste','Poste','pza']
];
const EPP = [
  ['eppBasico','EPP Básico'],['eppEspecifico','EPP Específico'],
  ['dc3','DC3'],['certMedico','Certificado médico']
];

function getLevs(){ try{ return JSON.parse(localStorage.getItem('lev_list')||'[]'); }catch(e){ return []; } }
function saveLevs(l){ try{ localStorage.setItem('lev_list', JSON.stringify(l)); return true; }
  catch(e){ alert('Almacenamiento lleno. Envía y cierra levantamientos terminados.'); return false; } }

const levIdx = parseInt(sessionStorage.getItem('lev_idx'));
let levs = getLevs();
if(isNaN(levIdx) || !levs[levIdx]){ window.location.href='index.html'; }

function render(){
  const lev = levs[levIdx];
  document.getElementById('folio').textContent = lev.folio || '';
  const d = lev.p2 || {};

  document.getElementById('matGrid').innerHTML = MATERIALES.map(([id,name,unit])=>{
    const v = d[id]!=null ? d[id] : '';
    return `<div class="mat${v!==''?' filled':''}" id="mat_${id}">
      <div class="mat-name">${name}</div>
      <div class="mat-row">
        <input id="${id}" inputmode="decimal" value="${v}" placeholder="0"
          oninput="markMat('${id}')">
        <span class="unit">${unit}</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('eppGrid').innerHTML = EPP.map(([id,label])=>{
    const on = d[id]==='1' || d[id]===true;
    return `<div class="chk${on?' on':''}" id="chk_${id}" data-id="${id}" onclick="toggleEpp('${id}')">
      <span class="box">✓</span><span>${label}</span></div>`;
  }).join('');
}
function markMat(id){
  const el=document.getElementById(id), box=document.getElementById('mat_'+id);
  box.classList.toggle('filled', el.value.trim()!=='');
}
function toggleEpp(id){ document.getElementById('chk_'+id).classList.toggle('on'); }

function guardar(){
  const d={};
  MATERIALES.forEach(([id])=>{ const el=document.getElementById(id); if(el) d[id]=el.value; });
  EPP.forEach(([id])=>{ d[id] = document.getElementById('chk_'+id).classList.contains('on') ? '1':''; });
  levs = getLevs();
  levs[levIdx].p2 = d;
  levs[levIdx].paso = Math.max(levs[levIdx].paso||1, 3);
  return saveLevs(levs);
}
function siguiente(){ if(guardar()) window.location.href='paso3.html'; }
function volver(){ guardar(); window.location.href='paso1.html'; }

render();
</script>
</body>
</html>
