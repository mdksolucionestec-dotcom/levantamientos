<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1080">
<title>Paso 3 · Inmueble</title>
<style>
:root{
  --bg:#f4f2f8;--card:#fff;--border:#e0ddf0;--primary:#1a1080;--primary-soft:#efeafb;
  --primary-2:#3a2ec0;--ink:#1b1830;--muted:#6a6688;--radius:14px;
  --shadow:0 1px 3px rgba(26,16,128,.06),0 6px 18px rgba(26,16,128,.05);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.4;padding-bottom:92px}
button{font-family:inherit;cursor:pointer;touch-action:manipulation}
input,select,textarea{font-family:inherit}

.hdr{position:sticky;top:0;z-index:40;background:var(--primary);color:#fff;
  padding:calc(env(safe-area-inset-top) + 12px) 16px 0;box-shadow:0 2px 12px rgba(26,16,128,.25)}
.hdr-row{display:flex;align-items:center;gap:12px;max-width:760px;margin:0 auto}
.back{background:rgba(255,255,255,.14);border:none;color:#fff;width:36px;height:36px;
  border-radius:10px;font-size:18px;flex:0 0 auto;display:grid;place-items:center}
.htxt h1{font-size:15px;margin:0;font-weight:700}
.htxt .folio{font-size:11.5px;opacity:.82;margin-top:1px;letter-spacing:.3px}
.prog{max-width:760px;margin:0 auto;display:flex;gap:6px;padding:12px 0 0}
.pstep{flex:1;text-align:center;padding-bottom:11px}
.pbar{height:4px;border-radius:4px;background:rgba(255,255,255,.25)}
.pstep.on .pbar{background:#fff}.pstep.done .pbar{background:#8fd6a8}
.plabel{font-size:10px;color:rgba(255,255,255,.75);margin-top:5px;font-weight:600}
.pstep.on .plabel{color:#fff}

.wrap{max-width:760px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.card h2{font-size:14px;margin:0 0 14px;color:var(--primary);font-weight:800;
  display:flex;align-items:center;gap:8px}
.card h2 .dot{width:8px;height:8px;border-radius:50%;background:var(--primary-2)}

.field{margin-bottom:12px}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{
  width:100%;padding:12px;border:1.5px solid var(--border);border-radius:11px;font-size:15px;
  background:#fbfaff;color:var(--ink);transition:border-color .15s,background .15s}
.field textarea{min-height:84px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary-2);background:#fff}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.chk-group{margin-bottom:12px}
.chk-group>label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
.chk-btns{display:flex;flex-wrap:wrap;gap:8px}
.chk-btn{border:1.5px solid var(--border);background:#fbfaff;color:var(--ink);border-radius:10px;
  padding:10px 14px;font-size:13.5px;font-weight:700;transition:.13s;flex:0 0 auto}
.chk-btn.sel{background:var(--primary);color:#fff;border-color:var(--primary);
  box-shadow:0 3px 8px rgba(26,16,128,.25)}
.chk-btn.wide{flex:1;min-width:82px}

.navbar{position:fixed;left:0;right:0;bottom:0;z-index:30;
  padding:12px 16px calc(env(safe-area-inset-bottom) + 12px);
  background:linear-gradient(to top,var(--bg) 62%,rgba(244,242,248,0))}
.nav-inner{max-width:760px;margin:0 auto;display:flex;gap:10px}
.btn{border:none;border-radius:12px;padding:14px;font-size:14.5px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .06s,background .15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(26,16,128,.28);flex:1.5}
.btn-primary:hover{background:var(--primary-2)}
.btn-ghost{background:#fff;color:var(--primary);border:1.5px solid var(--border);flex:1}
@media(max-width:360px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-row">
    <button class="back" onclick="volver()" aria-label="Atrás">‹</button>
    <div class="htxt"><h1>Consideraciones e inmueble</h1><div class="folio" id="folio">—</div></div>
  </div>
  <div class="prog">
    <div class="pstep done"><div class="pbar"></div><div class="plabel">Generales</div></div>
    <div class="pstep done"><div class="pbar"></div><div class="plabel">Material</div></div>
    <div class="pstep on"><div class="pbar"></div><div class="plabel">Inmueble</div></div>
    <div class="pstep"><div class="pbar"></div><div class="plabel">Evidencias</div></div>
  </div>
</header>

<main class="wrap">
  <div class="card">
    <h2><span class="dot"></span>Consideraciones de ingreso</h2>
    <div class="row2">
      <div class="field"><label>Obra civil</label><input id="obraCivil" placeholder="Descripción"></div>
      <div class="field"><label>Horario de instalación</label><input id="horarioInst" placeholder="Ej. 08:00–17:00"></div>
    </div>

    <div class="chk-group">
      <label>Escaleras</label>
      <div class="chk-btns" id="grp-escaleras">
        <button type="button" class="chk-btn wide" data-val="5" onclick="toggle(this,'grp-escaleras')">5</button>
        <button type="button" class="chk-btn wide" data-val="7" onclick="toggle(this,'grp-escaleras')">7</button>
        <button type="button" class="chk-btn wide" data-val="11" onclick="toggle(this,'grp-escaleras')">11</button>
        <button type="button" class="chk-btn wide" data-val="24" onclick="toggle(this,'grp-escaleras')">24</button>
      </div>
    </div>

    <div class="row2">
      <div class="field"><label>Plataforma (tipo)</label><input id="plataforma" placeholder="Tipo"></div>
      <div class="field"><label>Andamio (mts)</label><input id="andamio" inputmode="decimal" placeholder="0"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Segurista / vigía</label><input id="segurista" placeholder="Nombre / N.º"></div>
      <div class="field"><label>Quién otorga</label><input id="quienOtorga" placeholder="Responsable"></div>
    </div>
    <div class="field"><label>Cursos y certificaciones</label><input id="cursos" placeholder="Cursos requeridos"></div>
    <div class="field"><label>Equipo delimitador</label><input id="equipoDelim" placeholder="Conos, cinta, barreras…"></div>

    <div class="chk-group">
      <label>Área confinada</label>
      <div class="chk-btns" id="grp-confinada">
        <button type="button" class="chk-btn wide" data-val="Sí" onclick="toggle(this,'grp-confinada')">Sí</button>
        <button type="button" class="chk-btn wide" data-val="No" onclick="toggle(this,'grp-confinada')">No</button>
      </div>
    </div>
    <div class="field"><label>Día y hora de inducción</label><input id="diaInduccion" placeholder="Ej. Lun 08:00"></div>
    <div class="field"><label>Otro</label><input id="otroConside" placeholder="Otras consideraciones"></div>
  </div>

  <div class="card">
    <h2><span class="dot"></span>Estructura del inmueble</h2>

    <div class="chk-group">
      <label>Tipo de plafón</label>
      <div class="chk-btns" id="grp-plafon">
        <button type="button" class="chk-btn wide" data-val="Corrido" onclick="toggle(this,'grp-plafon')">Corrido</button>
        <button type="button" class="chk-btn wide" data-val="Modular" onclick="toggle(this,'grp-plafon')">Modular</button>
        <button type="button" class="chk-btn wide" data-val="Sin plafón" onclick="toggle(this,'grp-plafon')">Sin plafón</button>
      </div>
    </div>

    <div class="field"><label>Ductos eléctricos</label><input id="ductos" placeholder="Descripción"></div>
    <div class="chk-group">
      <label>Planos disponibles</label>
      <div class="chk-btns" id="grp-planos">
        <button type="button" class="chk-btn wide" data-val="Sí" onclick="toggle(this,'grp-planos')">Sí</button>
        <button type="button" class="chk-btn wide" data-val="No" onclick="toggle(this,'grp-planos')">No</button>
      </div>
    </div>

    <div class="field"><label>Registros</label><input id="registros" placeholder="Descripción"></div>
    <div class="row2">
      <div class="field"><label>¿Cuántos?</label><input id="cuantosReg" inputmode="numeric" placeholder="0"></div>
      <div class="field"><label>Tamaño</label><input id="tamanoReg" placeholder="Ej. 40x40 cm"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Acceso a vertical</label><input id="accesoVert" placeholder="Descripción"></div>
      <div class="field"><label>Altura inmueble / piso</label><input id="alturaInm" placeholder="Ej. 3 m"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Altura a instalar equipo</label><input id="alturaEquipo" placeholder="Ej. 4 m"></div>
      <div class="field"><label>Canal</label><input id="canal" placeholder="Canal"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Señal</label><input id="senal" placeholder="Señal"></div>
      <div class="field"><label>Estacionamiento y almacén</label><input id="estacion" placeholder="Disponibilidad"></div>
    </div>
    <div class="field"><label>Acceso a azotea</label><input id="azotea" placeholder="Descripción"></div>

    <div class="chk-group">
      <label>Correos con anticipación</label>
      <div class="chk-btns" id="grp-correos">
        <button type="button" class="chk-btn wide" data-val="Sí" onclick="toggle(this,'grp-correos')">Sí</button>
        <button type="button" class="chk-btn wide" data-val="No" onclick="toggle(this,'grp-correos')">No</button>
      </div>
    </div>
    <div class="chk-group">
      <label>Sitio en obra</label>
      <div class="chk-btns" id="grp-obra">
        <button type="button" class="chk-btn wide" data-val="Sí" onclick="toggle(this,'grp-obra')">Sí</button>
        <button type="button" class="chk-btn wide" data-val="No" onclick="toggle(this,'grp-obra')">No</button>
      </div>
    </div>

    <div class="field"><label>% Instalación en muro de</label><input id="instMuro" placeholder="Ej. 30% tablaroca"></div>
    <div class="row2">
      <div class="field"><label>Tipo de inmueble</label><input id="tipoInm" placeholder="Oficina, nave, escuela…"></div>
      <div class="field"><label>Permisos especiales</label><input id="permisos" placeholder="Permisos"></div>
    </div>
    <div class="field"><label>Observaciones</label><textarea id="obs" placeholder="Notas adicionales del inmueble…"></textarea></div>
  </div>
</main>

<nav class="navbar">
  <div class="nav-inner">
    <button class="btn btn-ghost" onclick="volver()">‹ Atrás</button>
    <button class="btn btn-primary" onclick="siguiente()">Guardar y continuar ›</button>
  </div>
</nav>

<script>
const TXT_IDS = ['obraCivil','horarioInst','plataforma','andamio','segurista','quienOtorga',
  'cursos','equipoDelim','diaInduccion','otroConside','ductos','registros','cuantosReg',
  'tamanoReg','accesoVert','alturaInm','alturaEquipo','canal','senal','estacion','azotea',
  'instMuro','tipoInm','permisos','obs'];
const GRUPOS = ['grp-escaleras','grp-confinada','grp-plafon','grp-planos','grp-correos','grp-obra'];

function getLevs(){ try{ return JSON.parse(localStorage.getItem('lev_list')||'[]'); }catch(e){ return []; } }
function saveLevs(l){ try{ localStorage.setItem('lev_list', JSON.stringify(l)); return true; }
  catch(e){ alert('Almacenamiento lleno. Envía y cierra levantamientos terminados.'); return false; } }

const levIdx = parseInt(sessionStorage.getItem('lev_idx'));
let levs = getLevs();
if(isNaN(levIdx) || !levs[levIdx]){ window.location.href='index.html'; }

function toggle(btn, gid){
  document.getElementById(gid).querySelectorAll('.chk-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

function cargar(){
  const lev = levs[levIdx];
  document.getElementById('folio').textContent = lev.folio || '';
  const d = lev.p3 || {};
  TXT_IDS.forEach(id=>{ const el=document.getElementById(id); if(el && d[id]!=null) el.value=d[id]; });
  GRUPOS.forEach(gid=>{
    const val = d['g_'+gid];
    if(val!=null && val!==''){
      const b = document.getElementById(gid).querySelector('.chk-btn[data-val="'+val+'"]');
      if(b) b.classList.add('sel');
    }
  });
  if(!document.getElementById('tipoInm').value && lev.tipo) { /* no autofill; tipo is levantamiento type */ }
}

function guardar(){
  const d={};
  TXT_IDS.forEach(id=>{ const el=document.getElementById(id); if(el) d[id]=el.value; });
  GRUPOS.forEach(gid=>{
    const sel = document.getElementById(gid)?.querySelector('.sel')?.dataset.val || '';
    d['g_'+gid] = sel;
  });
  levs = getLevs();
  levs[levIdx].p3 = d;
  levs[levIdx].paso = Math.max(levs[levIdx].paso||1, 4);
  return saveLevs(levs);
}
function siguiente(){ if(guardar()) window.location.href='paso4.html'; }
function volver(){ guardar(); window.location.href='paso2.html'; }

cargar();
</script>
</body>
</html>
