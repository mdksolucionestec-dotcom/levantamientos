<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paso 4 · Evidencias</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f2f8;min-height:100vh;padding-bottom:80px}
.hdr{background:#1a1080;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hlogo{width:38px;height:38px;background:#fff;border-radius:8px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.hlogo img{width:100%;height:100%;object-fit:contain}
.hdr-info{flex:1}.hdr h1{font-size:14px;font-weight:800}.hdr p{font-size:11px;opacity:.75}
.folio-b{background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.3);flex-shrink:0}
.bar{display:flex;gap:3px;padding:8px 16px;background:#fff;border-bottom:1px solid #e0ddf0}
.sd{flex:1;height:4px;border-radius:2px;background:#e0d8f0}
.sd.done{background:#6c63c6}.sd.active{background:#1a1080}
main{padding:14px;max-width:560px;margin:0 auto}
.card{background:#fff;border:1px solid #e0ddf0;border-radius:14px;padding:16px;margin-bottom:12px}
.card h2{font-size:12px;font-weight:800;color:#1a1080;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:11px}
.field label{display:block;font-size:12px;font-weight:600;color:#556;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;border:1px solid #d0cce8;border-radius:8px;padding:9px 12px;font-size:14px;color:#1a1a1a;background:#fff;outline:none;font-family:inherit;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#1a1080}
.field textarea{resize:vertical;min-height:70px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sec{font-size:11px;font-weight:700;color:#1a1080;text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;border-bottom:2px solid #e0ddf0;padding-bottom:5px}
.chk-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.chk-btn{padding:9px 14px;border:1.5px solid #d0cce8;border-radius:20px;font-size:13px;cursor:pointer;background:#fff;color:#444;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.chk-btn.sel{background:#1a1080;border-color:#1a1080;color:#fff}
.mat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mat-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #e0ddf0;border-radius:8px;background:#faf9ff}
.mat-item label{font-size:12px;flex:1;color:#333}
.mat-item input[type=number]{width:55px;border:1px solid #d0cce8;border-radius:6px;padding:4px 6px;font-size:13px;text-align:center}
.mat-item span{font-size:11px;color:#888;flex-shrink:0}
.btn{display:block;width:100%;padding:14px;background:#1a1080;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;margin-bottom:10px;touch-action:manipulation}
.btn:active{opacity:.85}
.btn.outline{background:#fff;color:#1a1080;border:2px solid #1a1080}
.btn.green{background:#145c2f}
.btn.red{background:#c0392b}
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.foto-thumb{aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid #e0ddf0;position:relative;background:#f0eef8}
.foto-thumb img{width:100%;height:100%;object-fit:cover}
.foto-del{position:absolute;top:3px;right:3px;background:rgba(180,0,0,.8);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.cat-card{background:#fff;border:1px solid #e0ddf0;border-radius:14px;padding:16px;margin-bottom:12px}
.cat-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.cat-hdr .ico{font-size:20px}
.cat-hdr h2{font-size:14px;font-weight:800;color:#1a1080;margin:0}
.cat-hdr .cnt{margin-left:auto;background:#e8e4f8;color:#1a1080;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.btn-fotos{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-foto{padding:11px 8px;border:1.5px solid #1a1080;border-radius:10px;background:#fff;color:#1a1080;font-size:13px;font-weight:700;cursor:pointer;text-align:center;touch-action:manipulation;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-foto:active{background:#e8e4f8}
.btn-foto.gal{border-color:#6c63c6;color:#6c63c6}
.btn-foto.gal:active{background:#f0eeff}
.total-bar{background:linear-gradient(135deg,#1a1080,#2e75b6);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.total-bar .lbl{font-size:12px;opacity:.8}
.total-bar .num{font-size:28px;font-weight:900}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1080;color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:600;transition:transform .3s;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:#145c2f}.toast.err{background:#c0392b}
</style>

<script>
const SURL='https://script.google.com/macros/s/AKfycbzWN48UEonDCDL3Ryxh6ztK3L7-rg68nhb04w9Qj-GDE2M3s18gCIPeIXfYygTYhyfMTw/exec';
const DRIVE_ID='1RugRIdGyuSumyKYg-OQqEMruU9umwztf';
const SHEET_ID='1P3DNpSKZsC0bDRlQeCZGFJ0EGJuRzIH-gzC1JGCtPQA';
let levIdx=parseInt(sessionStorage.getItem('lev_idx')||'0');
let rating=0;
const CATS=['antes','durante','despues','extras'];
const CAT_NAMES={'antes':'ANTES DE LA INSTALACIÓN','durante':'DURANTE LA INSTALACIÓN','despues':'DESPUÉS DE LA INSTALACIÓN','extras':'OBSERVACIONES / EXTRAS'};

function getLevs(){return JSON.parse(localStorage.getItem('lev_list')||'[]');}
function saveLevs(v){localStorage.setItem('lev_list',JSON.stringify(v));}
let lev=getLevs()[levIdx]||{};
if(!lev.fotos) lev.fotos={antes:[],durante:[],despues:[],extras:[]};

window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('folio-b').textContent=lev.folio||'';
  document.getElementById('folio-right').textContent=lev.folio||'';
  renderAll();
});

function tomarFoto(cat){document.getElementById('cam-'+cat).click();}
function selGaleria(cat){document.getElementById('gal-'+cat).click();}

function fotoCap(input, cat){
  const files=Array.from(input.files);
  if(!files.length) return;
  let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      // Comprimir imagen manteniendo alta calidad
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        // Media carta = 5.5" x 8.5" a 150dpi = 825 x 1275px
        const maxW=1650, maxH=2550; // doble para mejor calidad
        let w=img.width, h=img.height;
        if(w>maxW||h>maxH){
          const ratio=Math.min(maxW/w,maxH/h);
          w=Math.round(w*ratio); h=Math.round(h*ratio);
        }
        canvas.width=w; canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        const dataUrl=canvas.toDataURL('image/jpeg',0.92); // 92% calidad
        const foto={data:dataUrl, name:file.name||('foto_'+Date.now()+'.jpg'), type:'image/jpeg', ts:new Date().toISOString()};
        const levs=getLevs();
        if(!levs[levIdx].fotos) levs[levIdx].fotos={antes:[],durante:[],despues:[],extras:[]};
        levs[levIdx].fotos[cat].push(foto);
        saveLevs(levs);
        lev=levs[levIdx];
        loaded++;
        if(loaded===files.length){renderAll();toast('✅ '+files.length+' foto(s) agregada(s)','ok');}
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function borrarFoto(cat,i){
  if(!confirm('¿Eliminar esta foto?')) return;
  const levs=getLevs();
  levs[levIdx].fotos[cat].splice(i,1);
  saveLevs(levs); lev=levs[levIdx]; renderAll();
}

function renderAll(){
  let total=0;
  CATS.forEach(cat=>{
    const fotos=(lev.fotos&&lev.fotos[cat])||[];
    total+=fotos.length;
    document.getElementById('cnt-'+cat).textContent=fotos.length+' foto(s)';
    const grid=document.getElementById('grid-'+cat);
    grid.innerHTML=fotos.map((f,i)=>
      `<div class="foto-thumb"><img src="${f.data}" loading="lazy">
       <button class="foto-del" onclick="borrarFoto('${cat}',${i})">✕</button></div>`
    ).join('');
  });
  document.getElementById('total-fotos').textContent=total;
}

function setRating(n){
  rating=n;
  const stars=document.getElementById('stars').children;
  for(let i=0;i<5;i++) stars[i].textContent=i<n?'★':'☆';
}

// ── ENVIAR TODO ────────────────────────────────────────────────────────────────
async function enviar(){
  const btn=document.getElementById('btn-env');
  btn.disabled=true; btn.textContent='Generando PDF y enviando...';

  try{
    const levs=getLevs(); lev=levs[levIdx];
    const p1=lev.p1||{}, p2=lev.p2||{}, p3=lev.p3||{};
    const notasFinales=document.getElementById('notasFinales').value;

    // ── Generar PDF de evidencias fotográficas (media carta = 139.7 x 215.9 mm) ──
    const {jsPDF}=window.jspdf;
    const W=139.7, H=215.9; // Media carta en mm
    const doc=new jsPDF({unit:'mm',format:[W,H],orientation:'portrait'});
    let primeraPag=true;
    let totalFotos=0;

    for(const cat of CATS){
      const fotos=(lev.fotos&&lev.fotos[cat])||[];
      for(let i=0;i<fotos.length;i++){
        if(!primeraPag) doc.addPage([W,H]);
        primeraPag=false; totalFotos++;

        // Foto ocupa casi toda la página (márgenes mínimos)
        const M=5;
        const imgH=H-M*2-10; // 10mm para footer
        try{
          doc.addImage(fotos[i].data,'JPEG',M,M,W-M*2,imgH,'','FAST');
        }catch(e){
          doc.setFontSize(10);doc.setTextColor(150,150,150);
          doc.text('Error al cargar imagen',W/2,H/2,{align:'center'});
        }

        // Footer azul
        doc.setFillColor(26,16,128);
        doc.rect(0,H-10,W,10,'F');
        doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(255,255,255);
        doc.text(lev.folio+' · '+CAT_NAMES[cat],M,H-5.5);
        doc.text('Foto '+(i+1)+'/'+fotos.length+' · '+lev.fecha,W-M,H-5.5,{align:'right'});
      }
    }

    const pdfB64=totalFotos>0?doc.output('datauristring').split(',')[1]:null;

    // ── Preparar payload ──
    const fotosPayload={};
    for(const cat of CATS){
      fotosPayload[cat]=((lev.fotos&&lev.fotos[cat])||[]).map((f,i)=>{
        return {data:f.data.split(',')[1], name:cat+'_'+String(i+1).padStart(2,'0')+'_'+lev.folio+'.jpg', type:'image/jpeg'};
      });
    }

    const payload={
      accion:'levantamiento',
      folderId:DRIVE_ID, sheetId:SHEET_ID,
      folio:lev.folio, tecnico:lev.tecnico||p1.tecnicos,
      proyecto:lev.proyecto, empresa:lev.empresa||p1.empresa,
      direccion:lev.dir||p1.direccion, fecha:lev.fecha,
      tipo:lev.tipo, rating, notasFinales,
      totalFotos, p1, p2, p3,
      pdfEvidencias: pdfB64?{name:'Evidencias_'+lev.folio+'.pdf', data:pdfB64}:null,
      fotos: fotosPayload
    };

    // Descargar PDF localmente
    if(pdfB64) doc.save('Evidencias_'+lev.folio+'.pdf');

    // Enviar al Apps Script
    await fetch(SURL,{
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });

    // Marcar cerrado
    levs[levIdx].cerrado=true;
    saveLevs(levs);

    toast('✅ Levantamiento enviado a Drive','ok');
    setTimeout(()=>window.location.href='index.html',2500);

  }catch(err){
    console.error(err);
    toast('❌ Error: '+err.message,'err');
    btn.disabled=false; btn.textContent='☁️ Enviar levantamiento a Drive';
  }
}

function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+(type==='err'?'err':'ok');
  setTimeout(()=>el.className='toast',3500);
}
</script></body></html>
