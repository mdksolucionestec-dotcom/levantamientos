<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1080">
<title>Paso 4 · Evidencias</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#f4f2f8;--card:#fff;--border:#e0ddf0;--primary:#1a1080;--primary-soft:#efeafb;
  --primary-2:#3a2ec0;--ink:#1b1830;--muted:#6a6688;--ok:#1f9d55;--danger:#d13b3b;
  --radius:14px;--shadow:0 1px 3px rgba(26,16,128,.06),0 6px 18px rgba(26,16,128,.05);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.4;padding-bottom:150px}
button{font-family:inherit;cursor:pointer;touch-action:manipulation}
input,textarea{font-family:inherit}

.hdr{position:sticky;top:0;z-index:40;background:var(--primary);color:#fff;
  padding:calc(env(safe-area-inset-top) + 12px) 16px 0;box-shadow:0 2px 12px rgba(26,16,128,.25)}
.hdr-row{display:flex;align-items:center;gap:12px;max-width:760px;margin:0 auto}
.back{background:rgba(255,255,255,.14);border:none;color:#fff;width:36px;height:36px;
  border-radius:10px;font-size:18px;flex:0 0 auto;display:grid;place-items:center}
.htxt h1{font-size:15px;margin:0;font-weight:700}
.htxt .folio{font-size:11.5px;opacity:.82;margin-top:1px;letter-spacing:.3px}
.prog{max-width:760px;margin:0 auto;display:flex;gap:6px;padding:12px 0 0}
.pstep{flex:1;text-align:center;padding-bottom:11px}
.pbar{height:4px;border-radius:4px;background:rgba(255,255,255,.25)}
.pstep.on .pbar{background:#fff}.pstep.done .pbar{background:#8fd6a8}
.plabel{font-size:10px;color:rgba(255,255,255,.75);margin-top:5px;font-weight:600}
.pstep.on .plabel{color:#fff}

.wrap{max-width:760px;margin:0 auto;padding:16px}

.total-bar{background:var(--primary);color:#fff;border-radius:var(--radius);padding:16px;
  display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;
  box-shadow:0 6px 18px rgba(26,16,128,.28)}
.total-bar .lbl{font-size:12.5px;opacity:.85;font-weight:600}
.total-bar .num{font-size:30px;font-weight:800;line-height:1;margin-top:2px}
.total-bar .ic{font-size:34px;opacity:.9}

.cat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:15px;margin-bottom:14px}
.cat-head{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.cat-ic{font-size:20px}
.cat-title{font-size:14px;font-weight:800;color:var(--primary);flex:1}
.cat-count{font-size:11.5px;font-weight:800;color:var(--primary);background:var(--primary-soft);
  padding:4px 10px;border-radius:20px}
.thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.thumb{position:relative;aspect-ratio:1/1;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:#f0eef8}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .del{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;
  border:none;background:rgba(20,14,60,.72);color:#fff;font-size:14px;line-height:1;
  display:grid;place-items:center}
.cat-btns{display:flex;gap:8px}
.pill{flex:1;border:1.5px solid var(--border);background:#fbfaff;color:var(--primary);
  border-radius:11px;padding:12px;font-size:13px;font-weight:700;display:flex;align-items:center;
  justify-content:center;gap:7px;transition:.13s}
.pill:active{transform:scale(.98);background:var(--primary-soft)}
.hidden-input{display:none}

.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
.field textarea{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:11px;
  font-size:15px;background:#fbfaff;color:var(--ink);min-height:84px;resize:vertical}
.field textarea:focus{outline:none;border-color:var(--primary-2);background:#fff}

.stars{display:flex;gap:6px;margin-top:2px}
.star{font-size:34px;color:#d6d0ef;line-height:1;background:none;border:none;padding:0;transition:transform .1s}
.star.on{color:#f5b820}
.star:active{transform:scale(1.15)}

.navbar{position:fixed;left:0;right:0;bottom:0;z-index:30;
  padding:12px 16px calc(env(safe-area-inset-bottom) + 12px);
  background:linear-gradient(to top,var(--bg) 55%,rgba(244,242,248,0))}
.nav-inner{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:9px}
.nav-secondary{display:flex;gap:10px}
.btn{border:none;border-radius:12px;padding:14px;font-size:14.5px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .06s,background .15s}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.6;pointer-events:none}
.btn-send{background:var(--ok);color:#fff;box-shadow:0 4px 14px rgba(31,157,85,.32);width:100%;font-size:15.5px}
.btn-send:hover{background:#188047}
.btn-ghost{background:#fff;color:var(--primary);border:1.5px solid var(--border);flex:1}
.btn-pdf{background:#fff;color:var(--primary);border:1.5px solid var(--border);flex:1.4}

/* overlay envío */
.sending{position:fixed;inset:0;z-index:80;background:rgba(20,14,60,.55);display:none;
  align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.sending.on{display:flex}
.send-box{background:#fff;border-radius:18px;padding:26px 30px;text-align:center;max-width:320px;width:86%}
.spin{width:44px;height:44px;border:4px solid var(--primary-soft);border-top-color:var(--primary);
  border-radius:50%;margin:0 auto 14px;animation:sp 0.8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.send-box h3{margin:0 0 4px;font-size:16px}
.send-box p{margin:0;font-size:13px;color:var(--muted)}
.send-box.done .spin{display:none}
.check-ic{font-size:46px;color:var(--ok);margin-bottom:6px;display:none}
.send-box.done .check-ic{display:block}
@media(max-width:360px){.thumbs{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-row">
    <button class="back" onclick="volver()" aria-label="Atrás">‹</button>
    <div class="htxt"><h1>Evidencias fotográficas</h1><div class="folio" id="folio">—</div></div>
  </div>
  <div class="prog">
    <div class="pstep done"><div class="pbar"></div><div class="plabel">Generales</div></div>
    <div class="pstep done"><div class="pbar"></div><div class="plabel">Material</div></div>
    <div class="pstep done"><div class="pbar"></div><div class="plabel">Inmueble</div></div>
    <div class="pstep on"><div class="pbar"></div><div class="plabel">Evidencias</div></div>
  </div>
</header>

<main class="wrap">
  <div class="total-bar">
    <div>
      <div class="lbl">Total de fotos</div>
      <div class="num" id="totalNum">0</div>
    </div>
    <div class="ic">📷</div>
  </div>

  <div id="cats"></div>

  <div class="cat">
    <div class="cat-head"><span class="cat-ic">📝</span><span class="cat-title">Notas finales</span></div>
    <div class="field"><textarea id="notasFinales" placeholder="Resumen, pendientes u observaciones finales…"></textarea></div>
    <div class="cat-head" style="margin-top:14px"><span class="cat-ic">⭐</span><span class="cat-title">Calificación del servicio</span></div>
    <div class="stars" id="stars"></div>
  </div>
</main>

<nav class="navbar">
  <div class="nav-inner">
    <button class="btn btn-send" id="sendBtn" onclick="enviar()">📤 Enviar levantamiento a Drive</button>
    <div class="nav-secondary">
      <button class="btn btn-ghost" onclick="volver()">‹ Atrás</button>
      <button class="btn btn-pdf" onclick="descargarPDF()">📄 Descargar PDF</button>
    </div>
  </div>
</nav>

<div class="sending" id="sendOv">
  <div class="send-box" id="sendBox">
    <div class="spin"></div>
    <div class="check-ic">✓</div>
    <h3 id="sendTitle">Enviando…</h3>
    <p id="sendMsg">Subiendo fotos y evidencias a Drive.</p>
  </div>
</div>

<!-- inputs de archivo generados por categoría -->
<div id="fileInputs"></div>

<script>
/* ===================== CONFIGURACIÓN ===================== */
const SURL     = 'URL_DEL_APPS_SCRIPT';
const DRIVE_ID = 'ID_CARPETA_DRIVE';
const SHEET_ID = 'ID_GOOGLE_SHEET';
const LOGO     = '';
/* ======================================================== */

const CATS = [
  ['antes',  '📷', 'Antes de la instalación'],
  ['durante','🔧', 'Durante la instalación'],
  ['despues','✅', 'Después de la instalación'],
  ['extras', '📌', 'Observaciones / Extras']
];

function getLevs(){ try{ return JSON.parse(localStorage.getItem('lev_list')||'[]'); }catch(e){ return []; } }
function saveLevs(l){ try{ localStorage.setItem('lev_list', JSON.stringify(l)); return true; }
  catch(e){ alert('Almacenamiento lleno. No se pudo guardar la foto. Envía y cierra levantamientos terminados para liberar espacio.'); return false; } }

const levIdx = parseInt(sessionStorage.getItem('lev_idx'));
let levs = getLevs();
if(isNaN(levIdx) || !levs[levIdx]){ window.location.href='index.html'; }
let rating = 0;

function lev(){ return getLevs()[levIdx]; }
function fotosDe(cat){ const l=lev(); return (l.fotos&&l.fotos[cat])||[]; }

/* ---------- render ---------- */
function render(){
  const l = lev();
  document.getElementById('folio').textContent = l.folio || '';
  document.getElementById('notasFinales').value = l.notasFinales || '';
  rating = l.rating || 0;

  // categorías
  document.getElementById('cats').innerHTML = CATS.map(([cat,ic,title])=>{
    const fotos = (l.fotos&&l.fotos[cat])||[];
    const thumbs = fotos.map((f,i)=>`
      <div class="thumb">
        <img src="${f.data}" alt="">
        <button class="del" onclick="eliminar('${cat}',${i})" aria-label="Eliminar">✕</button>
      </div>`).join('');
    return `<div class="cat">
      <div class="cat-head">
        <span class="cat-ic">${ic}</span>
        <span class="cat-title">${title}</span>
        <span class="cat-count">${fotos.length}</span>
      </div>
      <div class="thumbs">${thumbs || ''}</div>
      <div class="cat-btns">
        <button class="pill" onclick="document.getElementById('cam-${cat}').click()">📷 Cámara</button>
        <button class="pill" onclick="document.getElementById('gal-${cat}').click()">🖼️ Galería</button>
      </div>
    </div>`;
  }).join('');

  // inputs de archivo (cámara + galería) por categoría
  document.getElementById('fileInputs').innerHTML = CATS.map(([cat])=>`
    <input class="hidden-input" type="file" accept="image/*" capture="environment"
      id="cam-${cat}" onchange="fotoCap(this,'${cat}')">
    <input class="hidden-input" type="file" accept="image/*" multiple
      id="gal-${cat}" onchange="fotoCap(this,'${cat}')">
  `).join('');

  // estrellas
  document.getElementById('stars').innerHTML = [1,2,3,4,5].map(n=>
    `<button class="star${n<=rating?' on':''}" onclick="setRating(${n})">${n<=rating?'★':'☆'}</button>`
  ).join('');

  actualizarTotal();
}
function actualizarTotal(){
  const l=lev(), n=CATS.reduce((s,[c])=>s+(((l.fotos&&l.fotos[c])||[]).length),0);
  document.getElementById('totalNum').textContent = n;
}
function setRating(n){
  rating=n;
  levs=getLevs(); levs[levIdx].rating=n; saveLevs(levs);
  document.querySelectorAll('.star').forEach((el,i)=>{
    const on=i<n; el.classList.toggle('on',on); el.textContent=on?'★':'☆';
  });
}

/* ---------- captura + compresión ---------- */
function fotoCap(input, cat){
  const files = Array.from(input.files||[]);
  if(!files.length) return;
  let pend = files.length;
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement('canvas');
        const maxW=1650, maxH=2550;              // media carta a alta resolución
        let w=img.width, h=img.height;
        if(w>maxW || h>maxH){
          const ratio=Math.min(maxW/w, maxH/h);
          w=Math.round(w*ratio); h=Math.round(h*ratio);
        }
        canvas.width=w; canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.92);   // 92% calidad
        guardarFoto(cat, { data:dataUrl, name:file.name||'foto.jpg',
          type:'image/jpeg', ts:new Date().toISOString() });
        if(--pend===0){ input.value=''; render(); }
      };
      img.onerror = ()=>{ if(--pend===0){ input.value=''; render(); } };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function guardarFoto(cat, foto){
  levs=getLevs();
  if(!levs[levIdx].fotos) levs[levIdx].fotos={antes:[],durante:[],despues:[],extras:[]};
  if(!levs[levIdx].fotos[cat]) levs[levIdx].fotos[cat]=[];
  levs[levIdx].fotos[cat].push(foto);
  saveLevs(levs);
}
function eliminar(cat, i){
  levs=getLevs();
  levs[levIdx].fotos[cat].splice(i,1);
  saveLevs(levs);
  render();
}

/* ---------- PDF de evidencias (media carta) ---------- */
function recolectarFotos(){
  const l=lev(), out=[];
  CATS.forEach(([cat,,title])=>{
    ((l.fotos&&l.fotos[cat])||[]).forEach(f=> out.push({...f, cat, catLabel:title.toUpperCase()}));
  });
  return out;
}
function fitRect(natW,natH,boxW,boxH,offX,offY){
  const r=Math.min(boxW/natW, boxH/natH);
  const w=natW*r, h=natH*r;
  return { x:offX+(boxW-w)/2, y:offY+(boxH-h)/2, w, h };
}
function cargarImg(src){ return new Promise(res=>{ const im=new Image();
  im.onload=()=>res(im); im.onerror=()=>res(null); im.src=src; }); }

async function generarPDF(){
  if(!window.jspdf || !window.jspdf.jsPDF){ alert('jsPDF no cargó. Revisa tu conexión e inténtalo de nuevo.'); return null; }
  const fotos = recolectarFotos();
  if(!fotos.length){ alert('No hay fotos para generar el PDF.'); return null; }
  const l=lev();
  const W=139.7, H=215.9;                        // media carta en mm
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:[W,H], orientation:'portrait' });
  const fecha = new Date().toLocaleDateString('es-MX');

  for(let i=0;i<fotos.length;i++){
    if(i>0) doc.addPage([W,H],'portrait');
    const f=fotos[i];
    const im=await cargarImg(f.data);
    // caja de imagen con márgenes 5mm, dejando 10mm inferior para el footer
    const boxX=5, boxY=5, boxW=W-10, boxH=H-15;
    if(im){
      const r=fitRect(im.naturalWidth||im.width, im.naturalHeight||im.height, boxW, boxH, boxX, boxY);
      doc.addImage(f.data,'JPEG', r.x, r.y, r.w, r.h, '', 'FAST');
    }
    // footer azul MDreieck
    doc.setFillColor(26,16,128);
    doc.rect(0, H-10, W, 10, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(6.5);
    doc.text((l.folio||'') + ' · ' + f.catLabel, 5, H-5.5);
    doc.text('Foto ' + (i+1) + '/' + fotos.length + ' · ' + fecha, W-5, H-5.5, {align:'right'});
  }
  return doc;
}
async function descargarPDF(){
  const doc = await generarPDF();
  if(doc) doc.save('Evidencias_' + (lev().folio||'levantamiento') + '.pdf');
}

/* ---------- guardar campos de esta pantalla ---------- */
function guardarCampos(){
  levs=getLevs();
  levs[levIdx].notasFinales = document.getElementById('notasFinales').value;
  levs[levIdx].rating = rating;
  saveLevs(levs);
}
function volver(){ guardarCampos(); window.location.href='paso3.html'; }

/* ---------- envío a Apps Script ---------- */
function stripB64(dataUrl){ const i=(dataUrl||'').indexOf('base64,'); return i>=0 ? dataUrl.slice(i+7) : dataUrl; }

async function enviar(){
  guardarCampos();
  const l=lev();
  const totalFotos = recolectarFotos().length;
  if(totalFotos===0 && !confirm('No hay fotos cargadas. ¿Enviar de todas formas?')) return;

  const ov=document.getElementById('sendOv'), box=document.getElementById('sendBox');
  const title=document.getElementById('sendTitle'), msg=document.getElementById('sendMsg');
  const btn=document.getElementById('sendBtn');
  box.classList.remove('done'); title.textContent='Generando PDF…'; msg.textContent='Preparando evidencias.';
  ov.classList.add('on'); btn.disabled=true;

  try{
    // 1. PDF de evidencias → base64
    let pdfEvidencias=null;
    const doc = await generarPDF();
    if(doc){
      const b64 = doc.output('datauristring');
      pdfEvidencias = { name:'Evidencias_'+(l.folio||'lev')+'.pdf', data:stripB64(b64) };
    }
    // descarga local también
    if(doc) doc.save('Evidencias_'+(l.folio||'levantamiento')+'.pdf');

    // 2. fotos por categoría con nombres
    title.textContent='Enviando…'; msg.textContent='Subiendo fotos a Drive.';
    const fotosOut={antes:[],durante:[],despues:[],extras:[]};
    CATS.forEach(([cat])=>{
      ((l.fotos&&l.fotos[cat])||[]).forEach((f,i)=>{
        fotosOut[cat].push({
          data: stripB64(f.data),
          name: cat + '_' + String(i+1).padStart(2,'0') + '_' + (l.folio||'lev') + '.jpg',
          type: 'image/jpeg'
        });
      });
    });

    // 3. payload
    const payload = {
      accion:'levantamiento', folderId:DRIVE_ID, sheetId:SHEET_ID,
      folio:l.folio, tecnico:l.tecnico, proyecto:l.proyecto, empresa:l.empresa,
      direccion:l.dir||(l.p1&&l.p1.direccion)||'', fecha:l.fecha, tipo:l.tipo,
      rating:l.rating||0, notasFinales:l.notasFinales||'', totalFotos,
      p1:l.p1||{}, p2:l.p2||{}, p3:l.p3||{},
      pdfEvidencias, fotos:fotosOut
    };

    // 4. POST (no-cors: GitHub Pages → Apps Script)
    if(SURL && SURL!=='URL_DEL_APPS_SCRIPT'){
      await fetch(SURL, {
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(payload)
      });
    }

    // 5. marcar como enviado
    levs=getLevs(); levs[levIdx].cerrado=true; levs[levIdx].enviado=new Date().toISOString();
    saveLevs(levs);

    box.classList.add('done'); title.textContent='¡Enviado!';
    msg.textContent = (SURL && SURL!=='URL_DEL_APPS_SCRIPT')
      ? 'Levantamiento subido a Drive y registrado en Sheets.'
      : 'PDF generado. Configura la URL del Apps Script para subir a Drive.';
    setTimeout(()=>{ window.location.href='index.html'; }, 1700);
  }catch(err){
    box.classList.remove('done');
    title.textContent='Error al enviar';
    msg.textContent='Revisa tu conexión. El PDF se descargó localmente. '+ (err&&err.message||'');
    btn.disabled=false;
    setTimeout(()=>ov.classList.remove('on'), 2600);
  }
}

render();
</script>
</body>
</html>
