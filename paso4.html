<script>
const SURL="https://script.google.com/macros/s/AKfycbzWN48UEonDCDL3Ryxh6ztK3L7-rg68nhb04w9Qj-GDE2M3s18gCIPeIXfYygTYhyfMTw/exec";
const DRIVE_ID="1RugRIdGyuSumyKYg-OQqEMruU9umwztf";
const SHEET_ID="1P3DNpSKZsC0bDRlQeCZGFJ0EGJuRzIH-gzC1JGCtPQA";

let fotos=[], rating=0;

const f=sessionStorage.getItem('folio')||'';
document.getElementById('folio-badge').textContent=f?'Folio: '+f:'';

// Fotos
document.getElementById('foto-input').addEventListener('change',function(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    fotos.push({data:ev.target.result, name:file.name||('foto_'+Date.now()+'.jpg'), type:file.type||'image/jpeg'});
    renderFotos();
  };
  reader.readAsDataURL(file);
  e.target.value='';
});

function renderFotos(){
  const grid=document.getElementById('foto-grid');
  const addBtn=document.getElementById('add-foto-btn');
  grid.innerHTML='';
  fotos.forEach((foto,i)=>{
    const div=document.createElement('div');
    div.className='foto-thumb';
    div.innerHTML='<img src="'+foto.data+'"><button class="foto-del" onclick="borrarFoto('+i+')">✕</button>';
    grid.appendChild(div);
  });
  grid.appendChild(addBtn);
  document.getElementById('foto-count').textContent=fotos.length+' foto(s) agregada(s)';
}

function borrarFoto(i){
  fotos.splice(i,1);
  renderFotos();
}

function setRating(n){
  rating=n;
  const stars=document.getElementById('stars').children;
  for(let i=0;i<5;i++) stars[i].textContent=i<n?'★':'☆';
}

function showToast(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+(ok?'ok':'err');
  t.style.display='block';
  setTimeout(()=>t.style.display='none',3500);
}

async function enviar(){
  const btn=document.getElementById('btn-enviar');
  btn.textContent='Enviando...';
  btn.disabled=true;

  const p1=JSON.parse(sessionStorage.getItem('p1')||'{}');
  const p2=JSON.parse(sessionStorage.getItem('p2')||'{}');
  const p3=JSON.parse(sessionStorage.getItem('p3')||'{}');
  const folio=sessionStorage.getItem('folio')||'---';

  const payload={
    folio, folderId:DRIVE_ID, sheetId:SHEET_ID,
    rating, notasFinales:document.getElementById('notasFinales').value,
    p1, p2, p3,
    fotos:fotos.map(f=>{return {data:f.data, name:f.name, type:f.type};}),
    timestamp:new Date().toISOString()
  };

  try{
    await fetch(SURL,{
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    showToast('✅ Levantamiento guardado correctamente',true);
    btn.textContent='✅ Enviado';
    btn.style.background='#145c2f';
    sessionStorage.clear();
  }catch(err){
    showToast('❌ Error al enviar. Intenta de nuevo.',false);
    btn.textContent='☁️ Reintentar';
    btn.disabled=false;
  }
}
</script></body></html>
