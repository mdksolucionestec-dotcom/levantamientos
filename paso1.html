<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1080">
<title>Paso 1 · Datos generales</title>
<style>
:root{
  --bg:#f4f2f8;--card:#fff;--border:#e0ddf0;--primary:#1a1080;--primary-soft:#efeafb;
  --primary-2:#3a2ec0;--ink:#1b1830;--muted:#6a6688;--radius:14px;
  --shadow:0 1px 3px rgba(26,16,128,.06),0 6px 18px rgba(26,16,128,.05);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.4;padding-bottom:92px}
button{font-family:inherit;cursor:pointer;touch-action:manipulation}
input,select,textarea{font-family:inherit}

.hdr{position:sticky;top:0;z-index:40;background:var(--primary);color:#fff;
  padding:calc(env(safe-area-inset-top) + 12px) 16px 0;box-shadow:0 2px 12px rgba(26,16,128,.25)}
.hdr-row{display:flex;align-items:center;gap:12px;max-width:760px;margin:0 auto}
.back{background:rgba(255,255,255,.14);border:none;color:#fff;width:36px;height:36px;
  border-radius:10px;font-size:18px;flex:0 0 auto;display:grid;place-items:center}
.htxt h1{font-size:15px;margin:0;font-weight:700}
.htxt .folio{font-size:11.5px;opacity:.82;margin-top:1px;letter-spacing:.3px}

/* progreso */
.prog{max-width:760px;margin:0 auto;display:flex;gap:6px;padding:12px 0 0}
.pstep{flex:1;text-align:center;padding-bottom:11px;position:relative}
.pbar{height:4px;border-radius:4px;background:rgba(255,255,255,.25)}
.pstep.on .pbar{background:#fff}
.pstep.done .pbar{background:#8fd6a8}
.plabel{font-size:10px;color:rgba(255,255,255,.75);margin-top:5px;font-weight:600}
.pstep.on .plabel{color:#fff}

.wrap{max-width:760px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.card h2{font-size:14px;margin:0 0 14px;color:var(--primary);font-weight:800;
  display:flex;align-items:center;gap:8px;letter-spacing:.2px}
.card h2 .dot{width:8px;height:8px;border-radius:50%;background:var(--primary-2)}

.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{
  width:100%;padding:12px;border:1.5px solid var(--border);border-radius:11px;font-size:15px;
  background:#fbfaff;color:var(--ink);transition:border-color .15s,background .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary-2);background:#fff}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.sub-h{font-size:11.5px;font-weight:800;color:var(--primary);text-transform:uppercase;
  letter-spacing:.6px;margin:14px 0 8px;padding-top:12px;border-top:1px dashed var(--border)}
.sub-h:first-child{border-top:none;padding-top:0;margin-top:0}

.navbar{position:fixed;left:0;right:0;bottom:0;z-index:30;
  padding:12px 16px calc(env(safe-area-inset-bottom) + 12px);
  background:linear-gradient(to top,var(--bg) 62%,rgba(244,242,248,0))}
.nav-inner{max-width:760px;margin:0 auto;display:flex;gap:10px}
.btn{border:none;border-radius:12px;padding:14px;font-size:14.5px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .06s,background .15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(26,16,128,.28);flex:1.5}
.btn-primary:hover{background:var(--primary-2)}
.btn-ghost{background:#fff;color:var(--primary);border:1.5px solid var(--border);flex:1}
@media(max-width:430px){.row3{grid-template-columns:1fr 1fr}}
@media(max-width:360px){.row2,.row3{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-row">
    <button class="back" onclick="volver()" aria-label="Atrás">‹</button>
    <div class="htxt">
      <h1>Datos generales</h1>
      <div class="folio" id="folio">—</div>
    </div>
  </div>
  <div class="prog">
    <div class="pstep on"><div class="pbar"></div><div class="plabel">Generales</div></div>
    <div class="pstep"><div class="pbar"></div><div class="plabel">Material</div></div>
    <div class="pstep"><div class="pbar"></div><div class="plabel">Inmueble</div></div>
    <div class="pstep"><div class="pbar"></div><div class="plabel">Evidencias</div></div>
  </div>
</header>

<main class="wrap">
  <div class="card">
    <h2><span class="dot"></span>Tipo y fecha</h2>
    <div class="field">
      <label>Tipo de levantamiento</label>
      <select id="tipo">
        <option>Instalación nueva</option><option>Mantenimiento</option>
        <option>Revisión</option><option>Ampliación</option>
      </select>
    </div>
    <div class="row2">
      <div class="field"><label>Fecha de reporte</label><input id="fechaReporte" type="date"></div>
      <div class="field"><label>Ejecutivo</label><input id="ejecutivo" placeholder="Ejecutivo"></div>
    </div>
  </div>

  <div class="card">
    <h2><span class="dot"></span>Datos del técnico</h2>
    <div class="field"><label>Nombre(s) del técnico(s)</label><input id="tecnicos" placeholder="Técnico(s)"></div>
    <div class="row2">
      <div class="field"><label>Hora de entrada</label><input id="horaEntrada" type="time"></div>
      <div class="field"><label>Hora de salida</label><input id="horaSalida" type="time"></div>
    </div>
  </div>

  <div class="card">
    <h2><span class="dot"></span>Datos del cliente</h2>
    <div class="field"><label>Nombre de la empresa</label><input id="empresa" placeholder="Empresa cliente"></div>
    <div class="row2">
      <div class="field"><label>Responsable</label><input id="responsable" placeholder="Nombre"></div>
      <div class="field"><label>Puesto</label><input id="puesto" placeholder="Puesto"></div>
    </div>
    <div class="field"><label>Dirección completa</label><input id="direccion" placeholder="Calle, número, ciudad"></div>
    <div class="row3">
      <div class="field"><label>Teléfono</label><input id="telefono" type="tel" placeholder="Tel."></div>
      <div class="field"><label>Extensión</label><input id="extension" placeholder="Ext."></div>
      <div class="field"><label>Correo</label><input id="correo" type="email" placeholder="correo@"></div>
    </div>
  </div>

  <div class="card">
    <h2><span class="dot"></span>Tiempos de servicio</h2>
    <div class="field"><label>Fecha de servicio</label><input id="fechaServicio" type="date"></div>

    <div class="sub-h">Desplazamiento 1</div>
    <div class="row2">
      <div class="field"><label>De</label><input id="d1De" type="time"></div>
      <div class="field"><label>A</label><input id="d1A" type="time"></div>
    </div>
    <div class="sub-h">Trabajo</div>
    <div class="row2">
      <div class="field"><label>De</label><input id="tDe" type="time"></div>
      <div class="field"><label>A</label><input id="tA" type="time"></div>
    </div>
    <div class="sub-h">Pausa de trabajo</div>
    <div class="row2">
      <div class="field"><label>De</label><input id="pDe" type="time"></div>
      <div class="field"><label>A</label><input id="pA" type="time"></div>
    </div>
    <div class="sub-h">Desplazamiento 2</div>
    <div class="row2">
      <div class="field"><label>De</label><input id="d2De" type="time"></div>
      <div class="field"><label>A</label><input id="d2A" type="time"></div>
    </div>
    <div class="sub-h">Totales</div>
    <div class="row3">
      <div class="field"><label>Horas totales</label><input id="hTotal" inputmode="decimal" placeholder="0"></div>
      <div class="field"><label>Horas de trabajo</label><input id="hTrabajo" inputmode="decimal" placeholder="0"></div>
      <div class="field"><label>Horas de viaje</label><input id="hViaje" inputmode="decimal" placeholder="0"></div>
    </div>
  </div>
</main>

<nav class="navbar">
  <div class="nav-inner">
    <button class="btn btn-ghost" onclick="volver()">‹ Inicio</button>
    <button class="btn btn-primary" onclick="siguiente()">Guardar y continuar ›</button>
  </div>
</nav>

<script>
const IDS = ['tipo','fechaReporte','ejecutivo','tecnicos','horaEntrada','horaSalida',
  'empresa','responsable','puesto','direccion','telefono','extension','correo',
  'fechaServicio','d1De','d1A','tDe','tA','pDe','pA','d2De','d2A',
  'hTotal','hTrabajo','hViaje'];

function getLevs(){ try{ return JSON.parse(localStorage.getItem('lev_list')||'[]'); }catch(e){ return []; } }
function saveLevs(l){ try{ localStorage.setItem('lev_list', JSON.stringify(l)); return true; }
  catch(e){ alert('Almacenamiento lleno. Envía y cierra levantamientos terminados.'); return false; } }

const levIdx = parseInt(sessionStorage.getItem('lev_idx'));
let levs = getLevs();
if(isNaN(levIdx) || !levs[levIdx]){ window.location.href='index.html'; }

function cargar(){
  const lev = levs[levIdx];
  document.getElementById('folio').textContent = lev.folio || '';
  const d = lev.p1 || {};
  IDS.forEach(id=>{ const el=document.getElementById(id); if(el && d[id]!=null) el.value=d[id]; });
  // defaults
  if(!document.getElementById('fechaReporte').value)
    document.getElementById('fechaReporte').value = lev.fecha || new Date().toISOString().slice(0,10);
  if(!document.getElementById('empresa').value && lev.empresa)
    document.getElementById('empresa').value = lev.empresa;
  if(!document.getElementById('direccion').value && lev.dir)
    document.getElementById('direccion').value = lev.dir;
  if(!document.getElementById('tecnicos').value && lev.tecnico)
    document.getElementById('tecnicos').value = lev.tecnico;
}

function guardar(){
  const d = {};
  IDS.forEach(id=>{ const el=document.getElementById(id); if(el) d[id]=el.value; });
  levs = getLevs();
  levs[levIdx].p1 = d;
  // sincroniza campos de resumen para la lista
  levs[levIdx].tipo    = d.tipo || levs[levIdx].tipo;
  levs[levIdx].empresa = d.empresa || levs[levIdx].empresa;
  levs[levIdx].paso    = Math.max(levs[levIdx].paso||1, 2);
  return saveLevs(levs);
}
function siguiente(){ if(guardar()) window.location.href='paso2.html'; }
function volver(){ guardar(); window.location.href='index.html'; }

cargar();
</script>
</body>
</html>
