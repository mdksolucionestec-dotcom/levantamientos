*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f2f8;min-height:100vh;padding-bottom:40px}
.hdr{background:#1a1080;color:#fff;padding:13px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hlogo{width:40px;height:40px;background:#fff;border-radius:8px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.hlogo img{width:100%;height:100%;object-fit:contain}
.hdr h1{font-size:15px;font-weight:800}.hdr p{font-size:11px;opacity:.75}
.hero{background:linear-gradient(135deg,#1a1080,#2e75b6);color:#fff;padding:26px 16px;text-align:center}
.hero h2{font-size:20px;font-weight:800;margin-bottom:6px}
.hero p{font-size:13px;opacity:.85}
main{padding:14px;max-width:560px;margin:0 auto}
.card{background:#fff;border:1px solid #e0ddf0;border-radius:14px;padding:16px;margin-bottom:12px}
.card h2{font-size:12px;font-weight:800;color:#1a1080;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.field{margin-bottom:11px}
.field label{display:block;font-size:12px;font-weight:600;color:#556;margin-bottom:4px}
.field input,.field select{width:100%;border:1px solid #d0cce8;border-radius:8px;padding:10px 12px;font-size:14px;color:#1a1a1a;background:#fff;outline:none;font-family:inherit;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:#1a1080;box-shadow:0 0 0 2px rgba(26,16,128,.1)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lev-card{background:#fff;border:1px solid #e0ddf0;border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;touch-action:manipulation}
.lev-card:active{background:#f0eeff}
.lev-ico{width:46px;height:46px;background:#e8e4f8;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.lev-info{flex:1}.lev-info h3{font-size:14px;font-weight:700;margin-bottom:2px}.lev-info p{font-size:11px;color:#778}
.lev-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0;background:#e8ecf8;color:#1a1080}
.lev-badge.done{background:#e8f4ec;color:#145c2f}
.btn{display:block;width:100%;padding:14px;background:#1a1080;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;margin-bottom:10px;touch-action:manipulation}
.btn:active{opacity:.85}
.btn.green{background:#145c2f}
.btn.outline{background:#fff;color:#1a1080;border:2px solid #1a1080}
.empty{text-align:center;padding:32px;color:#aaa;font-size:13px;line-height:1.8}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:800;color:#1a1080;margin-bottom:16px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1080;color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:600;transition:transform .3s;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:#145c2f}.toast.err{background:#c0392b}
</style></head><body>

<main>
  <div id="lista"></div>
  <button class="btn" onclick="showModal()">+ Nuevo levantamiento</button>

  <div class="modal-bg" id="modal">
    <div class="modal">
      <h2>Nuevo levantamiento</h2>
      <div class="field"><label>Técnico(s) *</label><input type="text" id="m-tecnico" placeholder="Nombre completo"></div>
      <div class="field"><label>Proyecto *</label><input type="text" id="m-proyecto" placeholder="Ej: PUEBLA, MONTERREY..." style="text-transform:uppercase"></div>
      <div class="field"><label>Empresa cliente *</label><input type="text" id="m-empresa" placeholder="Razón social o nombre"></div>
      <div class="field"><label>Dirección</label><input type="text" id="m-dir" placeholder="Dirección del sitio"></div>
      <div class="row2">
        <div class="field"><label>Fecha *</label><input type="date" id="m-fecha"></div>
        <div class="field"><label>Tipo</label>
          <select id="m-tipo">
            <option>Instalación nueva</option>
            <option>Mantenimiento</option>
            <option>Revisión</option>
            <option>Ampliación</option>
          </select>
        </div>
      </div>
      <button class="btn green" onclick="crearLev()">✅ Crear levantamiento</button>
      <button class="btn outline" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script>
const SURL='https://script.google.com/macros/s/AKfycbzWN48UEonDCDL3Ryxh6ztK3L7-rg68nhb04w9Qj-GDE2M3s18gCIPeIXfYygTYhyfMTw/exec';
const SHEET_ID='1P3DNpSKZsC0bDRlQeCZGFJ0EGJuRzIH-gzC1JGCtPQA';

function getLevs(){return JSON.parse(localStorage.getItem('lev_list')||'[]');}
function saveLevs(v){localStorage.setItem('lev_list',JSON.stringify(v));}

function render(){
  const levs=getLevs();
  const lista=document.getElementById('lista');
  if(!levs.length){lista.innerHTML='<div class="empty">📂 No hay levantamientos.<br>Crea uno para comenzar.</div>';return;}
  lista.innerHTML=levs.map((l,i)=>{
    const nFotos=Object.values(l.fotos||{}).reduce((s,a)=>s+a.length,0);
    const pasoActual=l.paso||1;
    const status=l.cerrado?'Enviado':'Paso '+pasoActual+'/4';
    return `<div class="lev-card" onclick="abrirLev(${i})">
      <div class="lev-ico">📋</div>
      <div class="lev-info">
        <h3>${l.folio||'...'} · ${l.proyecto}</h3>
        <p>${l.empresa} · ${l.tecnico}</p>
        <p style="color:#aaa;font-size:10px">${l.fecha} · ${nFotos} foto(s)</p>
      </div>
      <div class="lev-badge ${l.cerrado?'done':''}">${status}</div>
    </div>`;
  }).join('');
}

function showModal(){
  document.getElementById('m-fecha').value=new Date().toISOString().split('T')[0];
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}

async function crearLev(){
  const tecnico=document.getElementById('m-tecnico').value.trim();
  const proyecto=document.getElementById('m-proyecto').value.trim().toUpperCase();
  const empresa=document.getElementById('m-empresa').value.trim();
  const dir=document.getElementById('m-dir').value.trim();
  const fecha=document.getElementById('m-fecha').value;
  const tipo=document.getElementById('m-tipo').value;
  if(!tecnico||!proyecto||!empresa||!fecha){toast('Completa los campos obligatorios','err');return;}

  let folio='LEV-'+proyecto+'-001';
  try{
    const r=await fetch(SURL+'?accion=getConsec&proyecto=LEV-'+encodeURIComponent(proyecto)+'&sheet='+SHEET_ID);
    const d=await r.json();
    folio='LEV-'+proyecto+'-'+String(d.consec).padStart(3,'0');
  }catch(e){
    const levs=getLevs();
    const n=levs.filter(l=>l.proyecto===proyecto).length+1;
    folio='LEV-'+proyecto+'-'+String(n).padStart(3,'0');
  }

  const lev={folio,tecnico,proyecto,empresa,dir,fecha,tipo,
    paso:1,cerrado:false,
    p1:{},p2:{},p3:{},
    fotos:{antes:[],durante:[],despues:[],extras:[]},
    creado:new Date().toISOString()};

  const levs=getLevs();
  levs.unshift(lev);
  saveLevs(levs);
  closeModal();
  sessionStorage.setItem('lev_idx','0');
  window.location.href='paso1.html';
}

function abrirLev(i){
  sessionStorage.setItem('lev_idx',i);
  const levs=getLevs();
  const l=levs[i];
  if(l.cerrado) return toast('Este levantamiento ya fue enviado','err');
  const paso=l.paso||1;
  window.location.href='paso'+paso+'.html';
}

function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show '+(type==='err'?'err':'ok');
  setTimeout(()=>el.className='toast',3000);
}
render();
</script></body></html>
