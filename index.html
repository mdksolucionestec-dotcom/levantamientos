<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1080">
<title>MDreieck · Campo</title>
<style>
:root{
  --bg:#f4f2f8;--card:#fff;--border:#e0ddf0;--primary:#1a1080;--primary-soft:#efeafb;
  --primary-2:#3a2ec0;--ink:#1b1830;--muted:#6a6688;--ok:#1f9d55;--ok-soft:#e6f6ec;
  --warn:#9a6b04;--warn-soft:#fdf4dc;--danger:#c62828;--danger-soft:#fdeaea;
  --radius:14px;--shadow:0 1px 3px rgba(26,16,128,.06),0 6px 18px rgba(26,16,128,.05);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.4;padding-bottom:92px}
button{font-family:inherit;cursor:pointer;touch-action:manipulation}
input,select,textarea{font-family:inherit}

.hdr{position:sticky;top:0;z-index:40;background:var(--primary);color:#fff;
  padding:calc(env(safe-area-inset-top) + 14px) 16px 0;box-shadow:0 2px 12px rgba(26,16,128,.25)}
.hdr-row{display:flex;align-items:center;gap:11px;max-width:760px;margin:0 auto}
.logo{width:38px;height:38px;border-radius:9px;flex:0 0 auto;overflow:hidden;
  background:linear-gradient(135deg,#fff,#d9d4ff);display:grid;place-items:center;
  color:var(--primary);font-weight:800;font-size:15px;letter-spacing:-.5px}
.logo img{width:100%;height:100%;object-fit:cover}
.hdr h1{font-size:16px;margin:0;font-weight:700}
.hdr .sub{font-size:11.5px;opacity:.82;margin-top:1px}
.tabs{max-width:760px;margin:14px auto 0;display:flex;gap:4px}
.tab{flex:1;background:none;border:none;color:rgba(255,255,255,.7);font-size:13px;
  font-weight:700;padding:10px 4px 11px;border-bottom:3px solid transparent;transition:.15s}
.tab.on{color:#fff;border-bottom-color:#fff}

.wrap{max-width:760px;margin:0 auto;padding:14px 16px}

.banner{border-radius:12px;padding:11px 13px;font-size:12.5px;font-weight:600;
  display:flex;align-items:center;gap:9px;margin-bottom:13px;line-height:1.35}
.banner.off{background:var(--danger-soft);color:var(--danger);border:1px solid #f3c9c9}
.banner.pend{background:var(--warn-soft);color:var(--warn);border:1px solid #f0e0b0}
.banner .b-ic{font-size:17px;flex:0 0 auto}
.banner .b-act{margin-left:auto;background:var(--warn);color:#fff;border:none;border-radius:8px;
  padding:8px 12px;font-size:11.5px;font-weight:800;flex:0 0 auto}

.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:13px}
.count-chip{font-size:12.5px;color:var(--muted);font-weight:600}

.list{display:flex;flex-direction:column;gap:12px}
.item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:14px 15px;display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:transform .07s,box-shadow .15s,border-color .15s}
.item:active{transform:scale(.99)}
.item:hover{border-color:#c9c2ec}
.it-body{flex:1;min-width:0}
.it-folio{font-weight:800;font-size:14.5px;color:var(--primary);letter-spacing:.2px}
.it-folio .prov{font-size:9.5px;background:var(--warn-soft);color:var(--warn);
  padding:2px 6px;border-radius:5px;margin-left:6px;vertical-align:middle;font-weight:800}
.it-emp{font-size:13px;margin-top:2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.it-meta{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;flex-wrap:wrap;gap:3px 10px}
.it-side{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex:0 0 auto}
.badge{font-size:11px;font-weight:800;padding:5px 9px;border-radius:20px;white-space:nowrap}
.badge-step{background:var(--primary-soft);color:var(--primary)}
.badge-sent{background:var(--ok-soft);color:var(--ok)}
.badge-pend{background:var(--warn-soft);color:var(--warn)}
.chip{font-size:11px;color:var(--muted);font-weight:600}

.empty{text-align:center;padding:52px 20px;color:var(--muted)}
.empty .em-ic{font-size:40px;margin-bottom:8px}
.empty h3{margin:6px 0 4px;color:var(--ink);font-size:16px}
.empty p{margin:0;font-size:13px}

.fab-bar{position:fixed;left:0;right:0;bottom:0;z-index:30;
  padding:12px 16px calc(env(safe-area-inset-bottom) + 12px);
  background:linear-gradient(to top,var(--bg) 60%,rgba(244,242,248,0))}
.fab-inner{max-width:760px;margin:0 auto}
.btn{border:none;border-radius:12px;padding:14px 16px;font-size:14.5px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .06s,background .15s}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.6;pointer-events:none}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(26,16,128,.28)}
.btn-ghost{background:#fff;color:var(--primary);border:1.5px solid var(--border)}
.btn-block{width:100%}

.overlay{position:fixed;inset:0;z-index:60;background:rgba(20,14,60,.42);display:none;
  align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.sheet{background:#fff;width:100%;max-width:520px;border-radius:20px 20px 0 0;
  padding:8px 18px calc(env(safe-area-inset-bottom) + 18px);max-height:92vh;overflow:auto;
  animation:up .22s ease}
@keyframes up{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
.grab{width:42px;height:5px;border-radius:5px;background:#d9d4ee;margin:8px auto 10px}
.sheet h2{margin:2px 0 4px;font-size:17px}
.sheet .sh-sub{font-size:12px;color:var(--muted);margin:0 0 14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
.field input,.field select{width:100%;padding:12px;border:1.5px solid var(--border);
  border-radius:11px;font-size:15px;background:#fbfaff;color:var(--ink)}
.field input:focus,.field select:focus{outline:none;border-color:var(--primary-2);background:#fff}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.err{color:var(--danger);font-size:12px;margin:-6px 0 8px;min-height:1px}
.sheet-actions{display:flex;gap:10px;margin-top:6px}
@media(max-width:400px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-row">
    <div class="logo" id="brandLogo">MD</div>
    <div>
      <h1>MDreieck Campo</h1>
      <div class="sub">Levantamientos y evidencias</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tab-lev" onclick="setTab('lev')">Levantamientos</button>
    <button class="tab" id="tab-ev" onclick="setTab('ev')">Evidencias de sitio</button>
  </div>
</header>

<main class="wrap">
  <div id="banners"></div>
  <div class="toolbar">
    <span class="count-chip" id="countChip">—</span>
    <button class="btn btn-ghost" style="padding:9px 13px;font-size:13px" onclick="abrirModal()">＋ Nuevo</button>
  </div>
  <div class="list" id="list"></div>
</main>

<div class="fab-bar">
  <div class="fab-inner">
    <button class="btn btn-primary btn-block" id="fabBtn" onclick="abrirModal()">＋ Nuevo levantamiento</button>
  </div>
</div>

<div class="overlay" id="ov" onclick="if(event.target===this)cerrarModal()">
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="grab"></div>
    <h2 id="mTitle">Nuevo levantamiento</h2>
    <p class="sh-sub">El folio se genera aunque no haya señal.</p>

    <div class="field"><label>Técnico</label><input id="m_tecnico" placeholder="Nombre del técnico" autocomplete="off"></div>
    <div class="field" id="fld_capturado" style="display:none">
      <label>Capturado por</label><input id="m_capturado" placeholder="Quién toma la evidencia" autocomplete="off">
    </div>
    <div class="field"><label>Proyecto</label><input id="m_proyecto" placeholder="Ej. PUEBLA" autocomplete="off" style="text-transform:uppercase"></div>
    <div class="field"><label>Empresa cliente</label><input id="m_empresa" placeholder="Ej. Municipio de Puebla" autocomplete="off"></div>
    <div class="field"><label>Dirección</label><input id="m_dir" placeholder="Dirección del sitio" autocomplete="off"></div>
    <div class="row2">
      <div class="field"><label>Fecha</label><input id="m_fecha" type="date"></div>
      <div class="field"><label>Tipo</label><select id="m_tipo"></select></div>
    </div>
    <div class="err" id="mErr"></div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" style="flex:1.4" id="crearBtn" onclick="crear()">Crear</button>
    </div>
  </div>
</div>

<script>
/* ===================== CONFIGURACIÓN ===================== */
const SURL     = 'URL_DEL_APPS_SCRIPT';
const DRIVE_ID = 'ID_CARPETA_DRIVE';
const SHEET_ID = 'ID_GOOGLE_SHEET';
const LOGO     = '';   // 'data:image/jpeg;base64,...' logo MDreieck
/* ======================================================== */

const TIPOS_LEV = ['Instalación nueva','Mantenimiento','Revisión','Ampliación'];
const TIPOS_EV  = ['Levantamiento de sitio','Durante la instalación','Después de la instalación'];

let tab = sessionStorage.getItem('mdk_tab') || 'lev';

function getLevs(){ try{ return JSON.parse(localStorage.getItem('lev_list')||'[]'); }catch(e){ return []; } }
function saveLevs(l){ try{ localStorage.setItem('lev_list',JSON.stringify(l)); return true; }
  catch(e){ alert('Almacenamiento lleno. Envía y cierra registros terminados.'); return false; } }
function getEvs(){ try{ return JSON.parse(localStorage.getItem('ev_list')||'[]'); }catch(e){ return []; } }
function saveEvs(l){ try{ localStorage.setItem('ev_list',JSON.stringify(l)); return true; }
  catch(e){ alert('Almacenamiento lleno. Envía y cierra registros terminados.'); return false; } }

function countFotosLev(l){ const f=l.fotos||{};
  return ['antes','durante','despues','extras'].reduce((n,k)=>n+((f[k]&&f[k].length)||0),0); }
function fmtFecha(f){ if(!f) return '';
  const d=new Date(f+'T00:00:00'); if(isNaN(d)) return f;
  return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}); }

function online(){ return navigator.onLine !== false; }

function renderBanners(){
  const cont=document.getElementById('banners');
  const pend=getEvs().filter(e=>!e.enviado && e.listoParaEnviar).length;
  let html='';
  if(!online()){
    html = `<div class="banner off"><span class="b-ic">⚠️</span>
      <span>Sin conexión. Puedes crear y capturar todo; se guarda en el teléfono y se envía cuando haya señal.</span></div>`;
  } else if(pend>0){
    html = `<div class="banner pend"><span class="b-ic">🔄</span>
      <span>${pend} ${pend===1?'evidencia lista':'evidencias listas'} sin enviar.</span>
      <button class="b-act" onclick="sincronizar()">Enviar</button></div>`;
  }
  cont.innerHTML=html;
}

function setTab(t){
  tab=t; sessionStorage.setItem('mdk_tab',t);
  document.getElementById('tab-lev').classList.toggle('on',t==='lev');
  document.getElementById('tab-ev').classList.toggle('on',t==='ev');
  document.getElementById('fabBtn').textContent = t==='lev' ? '＋ Nuevo levantamiento' : '＋ Nueva evidencia de sitio';
  render();
}

function render(){
  renderBanners();
  const list=document.getElementById('list');
  const arr = tab==='lev' ? getLevs() : getEvs();
  document.getElementById('countChip').textContent =
    arr.length + ' ' + (tab==='lev'
      ? (arr.length===1?'levantamiento':'levantamientos')
      : (arr.length===1?'evidencia':'evidencias'));

  if(!arr.length){
    list.innerHTML = `<div class="empty">
      <div class="em-ic">${tab==='lev'?'📋':'📍'}</div>
      <h3>${tab==='lev'?'Sin levantamientos':'Sin evidencias de sitio'}</h3>
      <p>Crea el primero con el botón de abajo.</p></div>`;
    return;
  }
  const orden = arr.map((o,i)=>({o,i})).sort((a,b)=>(b.o.creado||'').localeCompare(a.o.creado||''));

  list.innerHTML = orden.map(({o,i})=>{
    if(tab==='lev'){
      const badge = o.cerrado ? '<span class="badge badge-sent">✓ Enviado</span>'
                              : `<span class="badge badge-step">Paso ${o.paso||1}/4</span>`;
      return `<div class="item" onclick="abrirLev(${i})">
        <div class="it-body">
          <div class="it-folio">${o.folio||'(sin folio)'}</div>
          <div class="it-emp">${o.empresa||o.proyecto||'—'}</div>
          <div class="it-meta"><span>👤 ${o.tecnico||'—'}</span><span>📅 ${fmtFecha(o.fecha)}</span></div>
        </div>
        <div class="it-side">${badge}<span class="chip">📷 ${countFotosLev(o)}</span></div>
      </div>`;
    }
    const nf=(o.medios||[]).filter(m=>m.kind==='foto').length;
    const nv=(o.medios||[]).filter(m=>m.kind==='video').length;
    const badge = o.enviado ? '<span class="badge badge-sent">✓ Enviado</span>'
      : (o.listoParaEnviar ? '<span class="badge badge-pend">Por enviar</span>'
                           : '<span class="badge badge-step">En captura</span>');
    const prov = o.folioProvisional ? '<span class="prov">PROV</span>' : '';
    return `<div class="item" onclick="abrirEv('${o.id}')">
      <div class="it-body">
        <div class="it-folio">${o.folio||'(sin folio)'}${prov}</div>
        <div class="it-emp">${o.empresa||o.proyecto||'—'}</div>
        <div class="it-meta"><span>🏷️ ${o.tipo||'—'}</span><span>📅 ${fmtFecha(o.fecha)}</span>
          ${o.gps&&o.gps.lat?'<span>📍 GPS</span>':''}</div>
      </div>
      <div class="it-side">${badge}<span class="chip">📷 ${nf} · 🎥 ${nv}</span></div>
    </div>`;
  }).join('');
}

function abrirLev(i){
  sessionStorage.setItem('lev_idx', i);
  const l=getLevs()[i];
  window.location.href='paso'+Math.min(Math.max(l.paso||1,1),4)+'.html';
}
function abrirEv(id){
  sessionStorage.setItem('ev_id', id);
  window.location.href='evidencia.html';
}
function sincronizar(){
  const pend=getEvs().filter(e=>!e.enviado && e.listoParaEnviar);
  if(!pend.length) return;
  sessionStorage.setItem('ev_id', pend[0].id);
  sessionStorage.setItem('ev_autosend','1');
  window.location.href='evidencia.html';
}

function abrirModal(){
  const esEv = tab==='ev';
  document.getElementById('mTitle').textContent = esEv?'Nueva evidencia de sitio':'Nuevo levantamiento';
  document.getElementById('fld_capturado').style.display = esEv?'block':'none';
  document.getElementById('m_tipo').innerHTML =
    (esEv?TIPOS_EV:TIPOS_LEV).map(t=>`<option>${t}</option>`).join('');
  document.getElementById('mErr').textContent='';
  if(!document.getElementById('m_fecha').value)
    document.getElementById('m_fecha').value=new Date().toISOString().slice(0,10);
  document.getElementById('ov').classList.add('open');
}
function cerrarModal(){ document.getElementById('ov').classList.remove('open'); }

async function crear(){
  const btn=document.getElementById('crearBtn'), errEl=document.getElementById('mErr');
  const tecnico=document.getElementById('m_tecnico').value.trim();
  const capturado=document.getElementById('m_capturado').value.trim();
  const proyecto=document.getElementById('m_proyecto').value.trim().toUpperCase().replace(/\s+/g,'-');
  const empresa=document.getElementById('m_empresa').value.trim();
  const dir=document.getElementById('m_dir').value.trim();
  const fecha=document.getElementById('m_fecha').value;
  const tipo=document.getElementById('m_tipo').value;

  if(!tecnico||!proyecto||!empresa){ errEl.textContent='Técnico, proyecto y empresa son obligatorios.'; return; }
  errEl.textContent=''; btn.disabled=true; btn.textContent='Creando…';

  if(tab==='lev'){
    const c=await consecutivo('LEV',proyecto,getLevs());
    const folio='LEV-'+proyecto+'-'+String(c.consec).padStart(3,'0');
    const levs=getLevs();
    levs.push({folio,folioProvisional:c.provisional,tecnico,proyecto,empresa,dir,fecha,tipo,
      paso:1,cerrado:false,creado:new Date().toISOString(),
      p1:{tipo,fechaReporte:fecha,empresa,direccion:dir,tecnicos:tecnico},p2:{},p3:{},
      fotos:{antes:[],durante:[],despues:[],extras:[]}});
    if(!saveLevs(levs)){ btn.disabled=false; btn.textContent='Crear'; return; }
    sessionStorage.setItem('lev_idx',levs.length-1);
    window.location.href='paso1.html';
  } else {
    const c=await consecutivo('EV',proyecto,getEvs());
    const folio='EV-'+proyecto+'-'+String(c.consec).padStart(3,'0');
    const id='ev_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    const evs=getEvs();
    evs.push({id,folio,folioProvisional:c.provisional,tecnico,capturadoPor:capturado||tecnico,
      proyecto,empresa,direccion:dir,fecha,tipo,
      gps:{},datos:{},medios:[],enviado:false,listoParaEnviar:false,
      creado:new Date().toISOString()});
    if(!saveEvs(evs)){ btn.disabled=false; btn.textContent='Crear'; return; }
    sessionStorage.setItem('ev_id',id);
    window.location.href='evidencia.html';
  }
}

/* Consecutivo: servidor si hay señal; si no, localStorage (folio provisional) */
async function consecutivo(prefijo, proyecto, lista){
  const localNext = lista.filter(o=>o.proyecto===proyecto).length + 1;
  if(!online() || !SURL || SURL==='URL_DEL_APPS_SCRIPT') return {consec:localNext, provisional:true};
  try{
    const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),5000);
    const r=await fetch(SURL+'?accion=getConsec&proyecto='+encodeURIComponent(prefijo+'-'+proyecto)+
      '&sheet='+encodeURIComponent(SHEET_ID),{signal:ctrl.signal});
    clearTimeout(t);
    const d=await r.json();
    if(d&&d.consec) return {consec:d.consec, provisional:false};
  }catch(e){}
  return {consec:localNext, provisional:true};
}

if(LOGO) document.getElementById('brandLogo').innerHTML='<img src="'+LOGO+'" alt="MD">';
window.addEventListener('online', render);
window.addEventListener('offline', render);
setTab(tab);
</script>
</body>
</html>
