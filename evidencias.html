<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Evidencia · MDreieck</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f2f8;min-height:100vh;padding-bottom:80px}
.hdr{background:#1a1080;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hlogo{width:38px;height:38px;background:#fff;border-radius:8px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.hlogo img{width:100%;height:100%;object-fit:contain}
.hdr-info{flex:1}.hdr h1{font-size:14px;font-weight:800}.hdr p{font-size:11px;opacity:.75}
.folio-b{background:rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;border:1px solid rgba(255,255,255,.3);flex-shrink:0;white-space:nowrap}
main{padding:14px;max-width:560px;margin:0 auto}
.info-bar{background:#fff;border:1px solid #e0ddf0;border-radius:12px;padding:12px 14px;margin-bottom:12px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.info-bar span{font-size:11px;color:#778}.info-bar b{font-size:13px;color:#1a1a1a;display:block}
.tipo-banner{border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:13px;font-weight:700;text-align:center}
.tipo-lev{background:#e8e4f8;color:#1a1080}
.tipo-dur{background:#fff3e0;color:#b05000}
.tipo-des{background:#e8f4ec;color:#145c2f}
.card{background:#fff;border:1px solid #e0ddf0;border-radius:14px;padding:16px;margin-bottom:12px}
.card h2{font-size:12px;font-weight:800;color:#1a1080;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:11px}
.field label{display:block;font-size:12px;font-weight:600;color:#556;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;border:1px solid #d0cce8;border-radius:8px;padding:9px 12px;font-size:14px;color:#1a1a1a;background:#fff;outline:none;font-family:inherit;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#1a1080}
.field textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.gps-box{background:#f0f4ff;border:1px solid #c0d0f0;border-radius:10px;padding:12px;margin-bottom:8px}
.gps-data{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
.gps-item{text-align:center}
.gps-item span{font-size:10px;color:#778;display:block}
.gps-item b{font-size:13px;color:#1a1080;display:block;margin-top:2px}
.btn-gps{width:100%;padding:11px;background:#1a1080;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;touch-action:manipulation}
.btn-gps:active{opacity:.85}
.medio-item{border:1px solid #e0ddf0;border-radius:12px;padding:12px;margin-bottom:10px;background:#fff}
.medio-preview{width:100%;border-radius:8px;overflow:hidden;margin-bottom:8px;background:#f0eef8;max-height:200px;display:flex;align-items:center;justify-content:center}
.medio-preview img{width:100%;max-height:200px;object-fit:cover;display:block}
.medio-preview video{width:100%;max-height:200px;display:block}
.medio-preview .vid-ico{font-size:48px;padding:20px;color:#6c63c6}
.medio-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.medio-tipo-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.badge-foto{background:#e8e4f8;color:#1a1080}
.badge-video{background:#fff3e0;color:#b05000}
.medio-del{margin-left:auto;background:none;border:none;color:#c0392b;font-size:18px;cursor:pointer;padding:2px;touch-action:manipulation}
.btn-agregar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.btn-med{padding:12px 6px;border:1.5px solid #1a1080;border-radius:10px;background:#fff;color:#1a1080;font-size:12px;font-weight:700;cursor:pointer;text-align:center;touch-action:manipulation}
.btn-med:active{background:#e8e4f8}
.btn-med.vid-btn{border-color:#b05000;color:#b05000}
.btn-med.vid-btn:active{background:#fff3e0}
.btn-med.gal-btn{border-color:#6c63c6;color:#6c63c6}
.btn-med.gal-btn:active{background:#f0eeff}
.total-bar{background:linear-gradient(135deg,#1a1080,#2e75b6);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.total-bar .lbl{font-size:12px;opacity:.8}
.total-bar .num{font-size:26px;font-weight:900}
.btn{display:block;width:100%;padding:14px;background:#1a1080;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;margin-bottom:10px;touch-action:manipulation}
.btn:active{opacity:.85}
.btn.green{background:#145c2f}
.btn.outline{background:#fff;color:#1a1080;border:2px solid #1a1080}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1080;color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:600;transition:transform .3s;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:#145c2f}.toast.err{background:#c0392b}
.sec{font-size:11px;font-weight:700;color:#1a1080;text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;border-bottom:2px solid #e0ddf0;padding-bottom:5px}
</style></head><body>

<main>
  <div class="tipo-banner" id="tipo-banner"></div>
  <div class="info-bar" id="info-bar"></div>

  <!-- GPS -->
  <div class="card">
    <h2>📍 Geolocalización</h2>
    <div class="gps-box">
      <button class="btn-gps" onclick="capturarGPS()">📡 Capturar ubicación GPS</button>
      <div class="gps-data" id="gps-data">
        <div class="gps-item"><span>Latitud</span><b id="gps-lat">—</b></div>
        <div class="gps-item"><span>Longitud</span><b id="gps-lon">—</b></div>
        <div class="gps-item"><span>Altitud</span><b id="gps-alt">—</b></div>
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>Latitud (manual)</label><input type="text" id="lat-manual" placeholder="Ej: 19.432608"></div>
      <div class="field"><label>Longitud (manual)</label><input type="text" id="lon-manual" placeholder="Ej: -99.133209"></div>
    </div>
    <div class="field"><label>Altitud (m)</label><input type="number" id="alt-manual" placeholder="metros sobre el nivel del mar"></div>
    <div class="field"><label>Localización / Entre calles</label><input type="text" id="entre-calles" placeholder="Ej: Entre Av. Juárez y Calle 5"></div>
  </div>

  <!-- INFO SITIO — visible según tipo -->
  <div id="sec-levantamiento">
    <div class="card">
      <h2>🏗️ Información del sitio</h2>
      <div class="field"><label>Tipo de suelo</label>
        <select id="tipo-suelo">
          <option value="">Seleccionar...</option>
          <option>Tierra natural</option>
          <option>Concreto</option>
          <option>Asfalto</option>
          <option>Arena</option>
          <option>Roca</option>
          <option>Arcilla</option>
          <option>Otro</option>
        </select>
      </div>
      <div class="field"><label>Observaciones del suelo</label><textarea id="obs-suelo" placeholder="Condiciones del suelo, humedad, estabilidad..."></textarea></div>
      <div class="field"><label>Viento (condiciones)</label>
        <select id="viento">
          <option value="">Seleccionar...</option>
          <option>Calma (sin viento)</option>
          <option>Brisa suave</option>
          <option>Viento moderado</option>
          <option>Viento fuerte</option>
          <option>Ráfagas</option>
        </select>
      </div>
      <div class="field"><label>Tipo de cimentación requerida</label><textarea id="cimentacion" placeholder="Descripción de la cimentación necesaria..."></textarea></div>
      <div class="field"><label>Cómo se colocará el poste/equipo</label><textarea id="como-poste" placeholder="Método de instalación del poste o equipo..."></textarea></div>
    </div>

    <div class="card">
      <h2>📡 Equipo a instalar</h2>
      <div class="field"><label>Tipo de equipo / poste</label><input type="text" id="tipo-equipo" placeholder="Ej: Poste metálico 9m, cámara PTZ..."></div>
      <div class="field"><label>Descripción del equipo</label><textarea id="desc-equipo" placeholder="Especificaciones del equipo a instalar..."></textarea></div>
      <div class="field"><label>Coordenadas del equipo</label><input type="text" id="coords-equipo" placeholder="Lat, Long del punto exacto de instalación"></div>
      <div class="field"><label>Foto de señal del equipo</label><input type="text" id="senal-equipo" placeholder="Nivel de señal, frecuencia, canal..."></div>
      <div class="field"><label>Plano / localización</label><input type="text" id="plano-loc" placeholder="Referencia en plano o mapa"></div>
    </div>

    <div class="card">
      <h2>🌤️ Condiciones climáticas</h2>
      <div class="row2">
        <div class="field"><label>Temperatura (°C)</label><input type="number" id="temperatura" placeholder="Ej: 25"></div>
        <div class="field"><label>Humedad (%)</label><input type="number" id="humedad" placeholder="Ej: 60" min="0" max="100"></div>
      </div>
      <div class="field"><label>Condiciones generales</label>
        <select id="clima">
          <option value="">Seleccionar...</option>
          <option>Despejado</option>
          <option>Parcialmente nublado</option>
          <option>Nublado</option>
          <option>Lluvia ligera</option>
          <option>Lluvia intensa</option>
          <option>Tormenta</option>
        </select>
      </div>
      <div class="field"><label>Observaciones climáticas</label><textarea id="obs-clima" placeholder="Condiciones del clima al momento del levantamiento..."></textarea></div>
    </div>
  </div>

  <!-- INFO DURANTE -->
  <div id="sec-durante" style="display:none">
    <div class="card">
      <h2>🔧 Proceso de instalación</h2>
      <div class="field"><label>Etapa actual del proceso</label><input type="text" id="etapa" placeholder="Ej: Excavación, colado de base, montaje..."></div>
      <div class="field"><label>Avance (%)</label><input type="number" id="avance" placeholder="0-100" min="0" max="100"></div>
      <div class="field"><label>Materiales utilizados</label><textarea id="mat-dur" placeholder="Lista de materiales empleados..."></textarea></div>
      <div class="field"><label>Incidencias o problemas</label><textarea id="incidencias" placeholder="Problemas encontrados, soluciones aplicadas..."></textarea></div>
      <div class="field"><label>Observaciones generales</label><textarea id="obs-dur" placeholder="Notas del proceso de instalación..."></textarea></div>
    </div>
  </div>

  <!-- INFO DESPUÉS -->
  <div id="sec-despues" style="display:none">
    <div class="card">
      <h2>✅ Configuración y pruebas</h2>
      <div class="field"><label>Configuración realizada</label><textarea id="config" placeholder="Configuración del equipo instalado..."></textarea></div>
      <div class="field"><label>Pruebas de funcionamiento</label><textarea id="pruebas" placeholder="Resultado de las pruebas realizadas..."></textarea></div>
      <div class="field"><label>Estado final del equipo</label>
        <select id="estado-final">
          <option value="">Seleccionar...</option>
          <option>Funcionando correctamente</option>
          <option>Funcionando con observaciones</option>
          <option>Pendiente de configuración</option>
          <option>Fuera de servicio</option>
        </select>
      </div>
      <div class="field"><label>Observaciones de entrega</label><textarea id="obs-des" placeholder="Notas de entrega al cliente..."></textarea></div>
    </div>
  </div>

  <!-- MEDIOS (fotos + videos) -->
  <div class="card">
    <h2>📸 Fotografías y videos</h2>
    <div class="total-bar" style="padding:10px 14px;margin-bottom:12px">
      <div><div class="lbl">Total de medios</div><div class="num" id="total-medios">0</div></div>
      <div style="text-align:right;font-size:12px;opacity:.8" id="medios-resumen">0 fotos · 0 videos</div>
    </div>

    <div class="btn-agregar">
      <button class="btn-med" onclick="abrirCamara()">📷 Cámara</button>
      <button class="btn-med gal-btn" onclick="abrirGaleria()">🖼️ Galería</button>
      <button class="btn-med vid-btn" onclick="grabarVideo()">🎥 Video</button>
    </div>

    <!-- Inputs ocultos -->
    <input type="file" accept="image/*" capture="environment" style="display:none" id="inp-cam" onchange="medioSeleccionado(this)">
    <input type="file" accept="image/*,video/*" multiple style="display:none" id="inp-gal" onchange="medioSeleccionado(this)">
    <input type="file" accept="video/*" capture="camcorder" style="display:none" id="inp-vid" onchange="medioSeleccionado(this)">

    <div id="medios-lista"></div>
  </div>

  <button class="btn green" id="btn-env" onclick="enviarDrive()">☁️ Enviar a Drive</button>
  <button class="btn" onclick="guardarLocal()" style="background:#6c63c6">💾 Guardar sin enviar</button>
  <a class="btn outline" href="index.html">← Mis proyectos</a>
</main>

  // Banner tipo
  const tb=document.getElementById('tipo-banner');
  tb.className='tipo-banner '+(TIPO_CSS[proy.tipoKey]||'tipo-lev');
  tb.textContent=TIPO_LABELS[proy.tipoKey]||proy.tipo;

  // Info bar
  document.getElementById('info-bar').innerHTML=
    '<div><span>Técnico</span><b>'+proy.tecnico+'</b></div>'+
    '<div><span>Capturado por</span><b>'+proy.capturadoPor+'</b></div>'+
    '<div><span>Fecha</span><b>'+proy.fecha+'</b></div>'+
    '<div><span>Sitio</span><b>'+proy.direccion.substring(0,30)+'</b></div>';

  // Mostrar sección según tipo
  document.getElementById('sec-levantamiento').style.display=proy.tipoKey==='lev'?'block':'none';
  document.getElementById('sec-durante').style.display=proy.tipoKey==='dur'?'block':'none';
  document.getElementById('sec-despues').style.display=proy.tipoKey==='des'?'block':'none';

  // Cargar datos guardados
  cargarDatos();
  renderMedios();
});

function getProys(){return JSON.parse(localStorage.getItem('ev_site_proys')||'[]');}
function saveProys(v){localStorage.setItem('ev_site_proys',JSON.stringify(v));}

// ── GPS ──────────────────────────────────────────────────────────
function capturarGPS(){
  if(!navigator.geolocation){toast('GPS no disponible en este dispositivo','err');return;}
  toast('Capturando ubicación...','ok');
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude.toFixed(6);
    const lon=pos.coords.longitude.toFixed(6);
    const alt=pos.coords.altitude?pos.coords.altitude.toFixed(1):'N/D';
    document.getElementById('gps-lat').textContent=lat;
    document.getElementById('gps-lon').textContent=lon;
    document.getElementById('gps-alt').textContent=alt+(alt!=='N/D'?' m':'');
    document.getElementById('lat-manual').value=lat;
    document.getElementById('lon-manual').value=lon;
    if(pos.coords.altitude) document.getElementById('alt-manual').value=pos.coords.altitude.toFixed(1);
    const proys=getProys();
    proys[proyIdx].gps={lat,lon,alt,ts:new Date().toISOString()};
    saveProys(proys); proy=proys[proyIdx];
    toast('✅ Ubicación capturada','ok');
  },err=>{
    toast('Error GPS: activa la ubicación del celular','err');
  },{enableHighAccuracy:true,timeout:15000});
}

// ── MEDIOS (fotos y videos) ──────────────────────────────────────
function abrirCamara(){document.getElementById('inp-cam').click();}
function abrirGaleria(){document.getElementById('inp-gal').click();}
function grabarVideo(){document.getElementById('inp-vid').click();}

function medioSeleccionado(input){
  const files=Array.from(input.files);
  if(!files.length) return;
  let procesados=0;

  files.forEach(file=>{
    const esVideo=file.type.startsWith('video/');
    const reader=new FileReader();
    reader.onload=ev=>{
      if(esVideo){
        // Video — guardar directo sin comprimir
        const medio={
          tipo:'video', data:ev.target.result,
          name:file.name||('video_'+Date.now()+'.mp4'),
          mimeType:file.type, size:file.size,
          observaciones:'', ts:new Date().toISOString()
        };
        agregarMedio(medio);
      } else {
        // Foto — comprimir con canvas (alta calidad, media carta)
        const img=new Image();
        img.onload=()=>{
          const canvas=document.createElement('canvas');
          const maxW=1800, maxH=2700; // alta resolución media carta
          let w=img.width, h=img.height;
          if(w>maxW||h>maxH){
            const ratio=Math.min(maxW/w,maxH/h);
            w=Math.round(w*ratio); h=Math.round(h*ratio);
          }
          canvas.width=w; canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          const dataUrl=canvas.toDataURL('image/jpeg',0.93);
          const medio={
            tipo:'foto', data:dataUrl,
            name:file.name||('foto_'+Date.now()+'.jpg'),
            mimeType:'image/jpeg', size:dataUrl.length,
            observaciones:'', ts:new Date().toISOString()
          };
          agregarMedio(medio);
        };
        img.src=ev.target.result;
      }
      procesados++;
      if(procesados===files.length) toast('✅ '+files.length+' medio(s) agregado(s)','ok');
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function agregarMedio(medio){
  const proys=getProys();
  if(!proys[proyIdx].medios) proys[proyIdx].medios=[];
  proys[proyIdx].medios.push(medio);
  saveProys(proys); proy=proys[proyIdx];
  renderMedios();
}

function actualizarObs(i, val){
  const proys=getProys();
  proys[proyIdx].medios[i].observaciones=val;
  saveProys(proys); proy=proys[proyIdx];
}

function eliminarMedio(i){
  if(!confirm('¿Eliminar este medio?')) return;
  const proys=getProys();
  proys[proyIdx].medios.splice(i,1);
  saveProys(proys); proy=proys[proyIdx];
  renderMedios();
}

function renderMedios(){
  const medios=proy.medios||[];
  const nFotos=medios.filter(m=>m.tipo==='foto').length;
  const nVids=medios.filter(m=>m.tipo==='video').length;
  document.getElementById('total-medios').textContent=medios.length;
  document.getElementById('medios-resumen').textContent=nFotos+' foto(s) · '+nVids+' video(s)';

  const lista=document.getElementById('medios-lista');
  if(!medios.length){lista.innerHTML='<p style="text-align:center;color:#aaa;font-size:13px;padding:16px">Aún no hay fotos ni videos</p>';return;}
  lista.innerHTML=medios.map((m,i)=>{
    const preview=m.tipo==='foto'
      ? `<img src="${m.data}" loading="lazy">`
      : `<div class="vid-ico">🎥</div>`;
    const badgeCls=m.tipo==='foto'?'badge-foto':'badge-video';
    const badgeTxt=m.tipo==='foto'?'📷 Foto':'🎥 Video';
    return `<div class="medio-item">
      <div class="medio-preview">${preview}</div>
      <div class="medio-header">
        <span class="medio-tipo-badge ${badgeCls}">${badgeTxt}</span>
        <span style="font-size:11px;color:#aaa">${m.ts?m.ts.split('T')[0]:''}</span>
        <button class="medio-del" onclick="eliminarMedio(${i})">🗑</button>
      </div>
      <div class="field">
        <label>Observaciones / notas de este medio</label>
        <textarea rows="2" style="width:100%;border:1px solid #d0cce8;border-radius:8px;padding:8px;font-size:13px;font-family:inherit;resize:vertical" 
          placeholder="Describe lo que muestra esta foto/video..." 
          oninput="actualizarObs(${i},this.value)">${m.observaciones||''}</textarea>
      </div>
    </div>`;
  }).join('');
}

// ── GUARDAR DATOS DEL FORMULARIO ─────────────────────────────────
function recopilarDatos(){
  const d={};
  const ids=['lat-manual','lon-manual','alt-manual','entre-calles',
    // levantamiento
    'tipo-suelo','obs-suelo','viento','cimentacion','como-poste',
    'tipo-equipo','desc-equipo','coords-equipo','senal-equipo','plano-loc',
    'temperatura','humedad','clima','obs-clima',
    // durante
    'etapa','avance','mat-dur','incidencias','obs-dur',
    // después
    'config','pruebas','estado-final','obs-des'];
  ids.forEach(id=>{const el=document.getElementById(id);if(el)d[id]=el.value;});
  return d;
}

function cargarDatos(){
  const d=proy.infoSitio||{};
  Object.keys(d).forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.value=d[id];
  });
  if(proy.gps){
    document.getElementById('gps-lat').textContent=proy.gps.lat||'—';
    document.getElementById('gps-lon').textContent=proy.gps.lon||'—';
    document.getElementById('gps-alt').textContent=proy.gps.alt||'—';
  }
}

function guardarLocal(){
  const proys=getProys();
  proys[proyIdx].infoSitio=recopilarDatos();
  saveProys(proys); proy=proys[proyIdx];
  toast('💾 Guardado en dispositivo','ok');
}

// ── ENVIAR A DRIVE ────────────────────────────────────────────────
async function enviarDrive(){
  const medios=proy.medios||[];
  const btn=document.getElementById('btn-env');
  btn.disabled=true; btn.textContent='Enviando...';

  // Guardar datos del formulario
  const proys=getProys();
  proys[proyIdx].infoSitio=recopilarDatos();
  saveProys(proys); proy=proys[proyIdx];

  try{
    // Generar PDF de evidencias (media carta, una foto por hoja)
    const {jsPDF}=window.jspdf;
    const W=139.7, H=215.9;
    const doc=new jsPDF({unit:'mm',format:[W,H],orientation:'portrait'});
    let primera=true;
    const fotos=medios.filter(m=>m.tipo==='foto');

    fotos.forEach((f,i)=>{
      if(!primera) doc.addPage([W,H]);
      primera=false;
      try{
        doc.addImage(f.data,'JPEG',5,5,W-10,H-18,'','FAST');
      }catch(e){
        doc.setFontSize(10);doc.setTextColor(150,150,150);
        doc.text('Error al cargar imagen',W/2,H/2,{align:'center'});
      }
      // Footer azul
      doc.setFillColor(26,16,128); doc.rect(0,H-13,W,13,'F');
      doc.setFont('helvetica','normal');doc.setFontSize(6);doc.setTextColor(255,255,255);
      doc.text(proy.folio+' · '+proy.tipo,3,H-8.5);
      doc.text('Foto '+(i+1)+'/'+fotos.length+' · '+proy.fecha,W-3,H-8.5,{align:'right'});
      if(f.observaciones){
        doc.setFontSize(5.5);
        doc.text('Obs: '+f.observaciones.substring(0,80),3,H-3.5);
      }
    });

    const pdfB64=fotos.length>0?doc.output('datauristring').split(',')[1]:null;
    if(pdfB64) doc.save('Evidencias_'+proy.folio+'.pdf');

    // Preparar medios para Drive
    const mediosPayload=medios.map((m,i)=>{
      const ext=m.tipo==='video'?'.mp4':'.jpg';
      return {
        data: m.data.includes(',') ? m.data.split(',')[1] : m.data,
        name: m.tipo+'_'+String(i+1).padStart(2,'0')+'_'+proy.folio+ext,
        mimeType: m.mimeType||'image/jpeg',
        tipo: m.tipo,
        observaciones: m.observaciones||''
      };
    });

    const payload={
      accion:'evidenciaSitio',
      folderId:DRIVE_ID, sheetId:SHEET_ID,
      folio:proy.folio, tecnico:proy.tecnico,
      capturadoPor:proy.capturadoPor,
      proyecto:proy.proyecto, empresa:proy.empresa,
      direccion:proy.direccion, fecha:proy.fecha,
      tipo:proy.tipo, tipoKey:proy.tipoKey,
      gps:proy.gps||null,
      infoSitio:proy.infoSitio||{},
      totalFotos:fotos.length,
      totalVideos:medios.filter(m=>m.tipo==='video').length,
      pdfEvidencias:pdfB64?{name:'Evidencias_'+proy.folio+'.pdf',data:pdfB64}:null,
      medios:mediosPayload
    };

    await fetch(SURL,{
      method:'POST',mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });

    // Marcar cerrado
    const proys2=getProys();
    proys2[proyIdx].cerrado=true;
    saveProys(proys2);
    toast('✅ Enviado a Drive correctamente','ok');
    setTimeout(()=>window.location.href='index.html',2500);

  }catch(err){
    console.error(err);
    toast('❌ Error: '+err.message,'err');
    btn.disabled=false; btn.textContent='☁️ Enviar a Drive';
  }
}

function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+(type==='err'?'err':'ok');
  setTimeout(()=>el.className='toast',3500);
}
